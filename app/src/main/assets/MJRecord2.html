<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="black" name="apple-mobile-web-app-status-bar-style">
		<meta content="telephone=no" name="format-detection">
		<title>模具下机记录</title>
		<!-- 引入 Vue 和 Vant 的 JS 文件 -->
		<script src="js/jquery.min.js"></script>
		<script src="js/vue.min.js"></script>
		<script src="js/vant.min.js"></script>
		<script src="js/common.js"></script>
		<link rel="stylesheet" href="styles/style.css" />
		<!-- 引入样式文件 -->
		<link rel="stylesheet" href="styles/vant.css" />
	</head>

	<body>
		<div id="app">
			<div>
				<van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
			</div>
			<div>
				<van-field v-model="Deplane_Time" label="日期时间" input-align="right" placeholder="请输入"  />
			</div>
			<div>
				<van-field v-model="Deplane_UserName" label="操机人员" input-align="right" placeholder="请输入"  />
			</div>
			<div>
				<van-field v-model="Device_Code" label="机台编码" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					required :error-message="errorMsg1" error-message-align="right" autofocus
					@keyup.enter.native="onEnter()" />
			</div>
			<div>
				<van-field v-model="MJ_Code" label="模具编码" input-align="right" placeholder="请输入或扫描模具" ref="filed1"
					required :error-message="errorMsg2" error-message-align="right" autofocus />
			</div>
			<div>
				<van-field v-model="Deplane_Remark" label="下机备注" input-align="right" ref="filed2"
					 autofocus />
			</div>
			
			<div class="btm_btn">
				<van-row>
					<van-col span="10">
						<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" block square @click="save">{{btnName}}</van-button>
					</van-col>
				</van-row>
			</div>
		</div>
		<script>
			new Vue({
				el: '#app',
				data: {
					btnName: '下机',
					Deplane_Time: '',
					Deplane_UserName: '',
					Deplane_User: '',
					Device_Code: '', //货架
					MJ_Code: '', //条码内容
					errorMsg1: "",
					errorMsg2: "",
					Deplane_Remark: ""
				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.Deplane_User = localStorage.userCode;
					this.Deplane_UserName = localStorage.userName;

				},
				created() {
					this.title = '模具下机记录';
				},
				methods: {
					getNowTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.Deplane_Time = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					backLast: function() {
						window.location.href = "javascript:history.go(-1)";
					},
					//出入库提交
					onEnter: function() {
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getmjrecord',
							type: 'Get',
							data: {
								Device_Code: self.Device_Code
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage
									.secret);
							},
							success: function (res) {
								if (res.code == 200) {
									self.errorMsg1 = ''
									if (res.data) {
										self.Device_Code = res.data.Device_Code;
										self.MJ_Code = res.data.MJ_Code;
										self.$refs.filed2.focus();
									}
								} else {
									self.errorMsg1 = '找不到对应的设备'
									self.$toast(res.msg);
								}
							},
							error: function () {
								self.errorMsg1 = '找不到对应的设备'
								self.$toast('找不到对应的设备');
							}
						})
					},
					//出入库提交
					save: function() {
						var self = this;
						var param = {
							Device_Code: self.Device_Code,
							MJ_Code: self.MJ_Code,
							Deplane_Time: self.Deplane_Time,
							Deplane_User: self.Deplane_User,
							Deplane_UserName: self.Deplane_UserName,
							Deplane_Remark:self.Deplane_Remark
						}
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认提交?',
						}).then(function() {
							$.ajax({
								url: serviceUrl + '/api/pda/savemjrecord2',
								type: 'POST',
								data: param,
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage
										.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.$dialog.alert({
											title: '提示',
											message: '操作成功!'
										}).then(function() {

											// 重置所有属性
											self.Device_Code = '';
											self.MJ_Code = '';
											self.errorMsg1 = '';
											self.errorMsg2 = '';
											self.Deplane_Remark = '';
											
											self.getNowTime();
										})
									} else {
										self.$toast(res.msg);

									}
								},
								error: function() {
									self.$toast('网络异常');
								}
							})
						}).catch(function() {
							// on cancel
						});
					},
					//重置
					reset: function() {
						var self = this;
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认重置?',
						}).then(function() {
							// 重置所有属性
							self.Device_Code = '';
							self.MJ_Code = '';
							self.errorMsg1 = '';
							self.errorMsg2 = '';
							self.Deplane_Remark = '';

							self.getNowTime();
						}).catch(function() {
							// on cancel
						});
					},
					//自动触发焦点聚焦
					onFocus: function(type) {
						var self = this;
						if (type == 0) {
							self.$refs.filed1.focus();
						} else if (type == 1) {
							self.$refs.filed2.focus();
						} else if (type == 2) {
							self.$refs.filed3.focus();
						}
					}
				}
			})
			Vue.config.devtools = true; //允许进行调试
		</script>
		<style>
			.row {
				display: flex;
				align-items: center;
				margin-bottom: 10px;
			}

			.field-label {
				margin-right: 10px;
				margin-right: 16px;
				font-size: 14px;
				color: #323233da;
				line-height: 32px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.flex-container {
				display: flex;
				align-items: center;
			}

			.flex-label-col {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100px;
				/* 根据需要调整高度 */
			}

			.flex-field-col {
				display: flex;
				flex-direction: column;
				justify-content: space-around;
			}

			.custom-van-field {
				background-color: rgb(255, 255, 255);
				/* padding: 10px; */
				display: inline-flex;
				justify-content: space-between;
				width: 100%;
			}
		</style>
	</body>
</html>
