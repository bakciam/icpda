<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="black" name="apple-mobile-web-app-status-bar-style">
    <meta content="telephone=no" name="format-detection">
    <title>IC首检</title>
    <!-- 引入 Vue 和 Vant 的 JS 文件 -->
    <script src="js/jquery.min.js"></script>
    <script src="js/vue.min.js"></script>
    <script src="js/vant.min.js"></script>
    <script src="js/common.js"></script>
    <link rel="stylesheet" href="styles/style.css" />
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="styles/vant.css" />
    <style>
        /* 加载遮罩层样式 */
        .loading-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            flex-direction: column;
        }
        .loading-text {
            margin-top: 10px;
            color: #333;
            font-size: 14px;
        }
        
        /* 原有样式 */
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .field-label {
            margin-right: 10px;
            margin-right: 16px;
            font-size: 14px;
            color: #323233da;
            line-height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .flex-container {
            display: flex;
            align-items: center;
        }
        .flex-label-col {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
        }
        .flex-field-col {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        .custom-van-field {
            background-color: rgb(255, 255, 255);
            display: inline-flex;
            justify-content: space-between;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- 加载遮罩层 -->
        <div class="loading-mask" v-if="isLoading">
            <div class="loading-content">
                <van-loading type="spinner" color="#1989fa" />
                <div class="loading-text">提交中，请稍候...</div>
            </div>
        </div>
        
        <div>
            <van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
        </div>
        <div>
            <van-cell value="1、工序检查频率：断电开机、更换辅料（载带，盖带）设备封带相关维修、设备停止生产4小时以上。
2、载带厂家可填写供应商简写，比如J-捷本，H-昊林。颜色填写黑色或透明。" />
        </div>
        <div>
            <van-field v-model="TypeName" label="填写类型" input-align="right" placeholder="请选择">
                <template #input>
                    <van-dropdown-menu>
                        <van-dropdown-item v-model="TypeModel" :options="options" @change="onSelect" />
                    </van-dropdown-menu>
                </template>
            </van-field>
        </div>
        <div>
            <van-field v-model="time" label="日期时间" input-align="right" placeholder="请输入" ref="filed1" required
                :error-message="errorMsg1" error-message-align="right" />
        </div>
        <div id='no'>
            <van-field v-model="locationCode" label="机台号" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
                autofocus required :error-message="errorMsg1" error-message-align="right"
                @keyup.enter.native="onEnter(1)" />
        </div>
        <div>
            <van-field v-model="materialContent" label="工卡号" input-align="right" placeholder="请输入或扫描工卡号"
                @keyup.enter.native="onEnter(2)" autofocus ref="filed2" required :error-message="errorMsg2"
                error-message-align="right" />
        </div>

        <div>
            <van-field disabled v-model="pModel" label="产品型号" input-align="right" placeholder="请输入" ref="filed1"
                required :error-message="errorMsg1" error-message-align="right" />
        </div>

        <div>
            <van-field disabled v-model="package" label="封装类型" input-align="right" placeholder="请输入" ref="filed1"
                required :error-message="errorMsg1" error-message-align="right" />
        </div>

        <div>
            <van-field v-model="tapeManufacturers" label="载带厂家" input-align="right" placeholder="请输入" ref="filed1"
                required :error-message="errorMsg1" error-message-align="right" />
        </div>

        <div>
            <van-field label="载带颜色（黑/透）" required input-align="right">
                <template #input>
                    <van-radio-group v-model="tapeColor" direction="horizontal">
                        <van-radio name="黑">黑</van-radio>
                        <van-radio name="透">透</van-radio>
                    </van-radio-group>
                </template>
            </van-field>
        </div>
        <div>
            <van-row id="size" class="flex-container">
                <van-col span="4"
                    style="display: flex; justify-content: center; align-items: center; writing-mode: vertical-rl; text-orientation: upright;">
                    拉力测试值（g）
                </van-col>
                <van-col span="19" class="flex-field-col">
                    <van-row>
                        <van-field required v-model="min" label="最小值" input-align="right" placeholder="输入..."
                            ref="filed3" :style="{ backgroundColor: isminOfRange(min)  }" />
                    </van-row>
                    <van-row>
                        <van-field required v-model="max" label="最大值" input-align="right" placeholder="输入..."
                            :style="{ backgroundColor: ismaxOfRange(max)  }" />
                    </van-row>
                    <van-row>
                        <van-field required v-model="range" label="极差值" input-align="right" placeholder="输入..."
                            :style="{ backgroundColor: israngeOfRange(range)  }" />
                    </van-row>
                    <van-row>
                        <van-field required v-model="average" label="平均值" input-align="right" placeholder="输入..."
                            :style="{ backgroundColor: isaverageOfRange(average)  }" />
                    </van-row>
                    <van-row>
                        <van-field required v-model="standardDeviation" label="标准差" input-align="right"
                            placeholder="输入..." />
                    </van-row>
                </van-col>
            </van-row>
        </div>

        <div class='no'>
            <van-field v-model="qc" label="录入人" input-align="right" placeholder="请输入" required />
        </div>

        <div class='no'>
            <van-field required v-model="remark" label="备注" input-align="right" placeholder="请输入" />
        </div>
        <van-tag type="success" size="large">{{tag}}</van-tag>

        <div class="btm_btn">
            <van-row>
                <van-col span="10">
                    <van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
                </van-col>
                <van-col span="14">
                    <!-- 禁用按钮防止重复点击 -->
                    <van-button type="info" block square @click="save" :disabled="isLoading">{{btnName}}</van-button>
                </van-col>
            </van-row>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                type: '', //物料类型
                btnName: '确认',
                showPicker: false,
                columns: [],
                qc: '',
                qcCode: '',
                locationCode: '', //货架
                materialContent: '', //条码内容
                errorMsg1: "",
                errorMsg2: "",
                pModel: "",
                time: "",
                package: '',
                remark: '',
                shebeikouya: [],
                wuliaokouya: [],
                judgment: '',
                tapeManufacturers: '',
                tapeColor: "",
                tag: "No:JDW-WI-Q-Q011-02(C)",
                min: '',
                max: '',
                range: '',
                average: '',
                packageLimits: null,
                standardDeviation: '',
                TypeName: '',
                TypeModel: '正常拉力测试',
                options: [{
                        text: '①.正常拉力测试',
                        value: '正常拉力测试',
                    },
                    {
                        text: '②.保养设备拉力测试',
                        value: '保养设备拉力测试',
                    }
                ],
                // 新增加载状态
                isLoading: false
            },
            mounted: function(data) {
                this.getNowTime();
                this.qcCode = localStorage.userCode;
                this.qc = localStorage.userName;
            },
            created() {
                var type = getQueryVariable('type'); //线边仓库类型或仓库类型	
                var materialContent = getQueryVariable('CardID') || ""; //线边仓库类型或仓库类型
                var locationCode = getQueryVariable('EquipmentCode') || ""; //线边仓库类型或仓库类型

                this.title = 'IC测试站拉力记录表'

                if (locationCode != null) {
                    this.materialContent = materialContent
                    this.locationCode = locationCode
                }
            },
            methods: {
                onSelect(value) {
                    const selectedOption = this.options.find(option => option.value === value);
                    this.TypeModel = selectedOption ? selectedOption.value : '';
                },
                // 表单校验方法
                validateForm() {
                    // 校验必填项
                    if (!this.time) {
                        this.$toast('请填写日期时间');
                        return false;
                    }
                    if (!this.locationCode) {
                        this.$toast('请填写机台号');
                        return false;
                    }
                    if (!this.materialContent) {
                        this.$toast('请填写工卡号');
                        return false;
                    }
                    if (!this.pModel) {
                        this.$toast('产品型号不能为空');
                        return false;
                    }
                    if (!this.package) {
                        this.$toast('封装类型不能为空');
                        return false;
                    }
                    if (!this.tapeManufacturers) {
                        this.$toast('请填写载带厂家');
                        return false;
                    }
                    if (!this.tapeColor) {
                        this.$toast('请选择载带颜色');
                        return false;
                    }
                    if (!this.min) {
                        this.$toast('请填写最小值');
                        return false;
                    }
                    if (!this.max) {
                        this.$toast('请填写最大值');
                        return false;
                    }
                    if (!this.range) {
                        this.$toast('请填写极差值');
                        return false;
                    }
                    if (!this.average) {
                        this.$toast('请填写平均值');
                        return false;
                    }
                    if (!this.standardDeviation) {
                        this.$toast('请填写标准差');
                        return false;
                    }
                    if (!this.qc) {
                        this.$toast('请填写录入人');
                        return false;
                    }
                    if (!this.remark) { // 修复self指向错误
                        this.$toast('请填写备注');
                        return false;
                    }

                    if (this.TypeModel == '正常拉力测试') {
                        // 直接调用已有的样式判断方法，判断是否超范围
                        if (this.isminOfRange(this.min) === 'red') {
                            this.$toast(`最小值不能低于${this.packageLimits.LowerLimit}g`);
                            return false;
                        }
                        if (this.ismaxOfRange(this.max) === 'red') {
                            this.$toast(`最大值不能高于${this.packageLimits.UpperLimit}g`);
                            return false;
                        }
                        if (this.israngeOfRange(this.range) === 'red') {
                            this.$toast(`极差值不能高于${this.packageLimits.RangeUpperLimit}g`);
                            return false;
                        }
                        if (this.isaverageOfRange(this.average) === 'red') {
                            this.$toast(
                                `平均值必须在${this.packageLimits.AverageLowerLimit}~${this.packageLimits.AverageUpperLimit}g之间`
                            );
                            return false;
                        }
                    }
                    return true;
                },
                isminOfRange(value) {
                    const num = parseFloat(value);
                    if (isNaN(num) || this.packageLimits === null) {
                        return 'white';
                    }
                    if (num < this.packageLimits.LowerLimit) {
                        return 'red';
                    } else {
                        return 'white';
                    }
                },
                ismaxOfRange(value) {
                    const num = parseFloat(value);
                    if (isNaN(num) || this.packageLimits === null) {
                        return 'white';
                    }
                    if (num > this.packageLimits.UpperLimit) {
                        return 'red';
                    } else {
                        return 'white';
                    }
                },
                israngeOfRange(value) {
                    const num = parseFloat(value);
                    if (isNaN(num) || this.packageLimits === null) {
                        return 'white';
                    }
                    if (num > this.packageLimits.RangeUpperLimit) {
                        return 'red';
                    } else {
                        return 'white';
                    }
                },
                isaverageOfRange(value) {
                    const num = parseFloat(value);
                    if (isNaN(num) || this.packageLimits === null) {
                        return "white";
                    }
                    if (num < this.packageLimits.AverageLowerLimit || num > this.packageLimits.AverageUpperLimit) {
                        return "red";
                    } else {
                        return "white";
                    }
                },
                getNowTime() {
                    let now = new Date();
                    let year = now.getFullYear();
                    let month = (now.getMonth() + 1).toString().padStart(2, '0');
                    let day = now.getDate().toString().padStart(2, '0');
                    let hours = now.getHours().toString().padStart(2, '0');
                    let minutes = now.getMinutes().toString().padStart(2, '0');
                    let seconds = now.getSeconds().toString().padStart(2, '0');
                    this.time = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
                },
                showPopup() {
                    this.showPicker = true;
                },
                backLast: function() {
                    window.location.href = "javascript:history.go(-1)";
                },
                //出入库提交
                save: function() {
                    var self = this;
                    // 先进行表单校验
                    if (!self.validateForm()) {
                        return; // 校验失败则直接返回
                    }

                    var param = {
                        time: self.time,
                        cardID: self.materialContent,
                        equCode: self.locationCode,
                        package: self.package,
                        judgment: self.judgment,
                        qc: localStorage.userName,
                        qcCode: localStorage.userCode,
                        remark: self.remark,
                        wuliaokouya: this.wuliaokouya.includes("NG") ? "NG" : "",
                        shebeikouya: this.shebeikouya.includes("NG") ? "NG" : "",
                        average: self.average,
                        range: self.range,
                        max: self.max,
                        min: self.min,
                        tag: self.tag,
                        tapeColor: self.tapeColor,
                        tapeManufacturers: self.tapeManufacturers,
                        standardDeviation: self.standardDeviation
                    }
                    self.$dialog.confirm({
                        title: '提示',
                        message: '是否确认提交?',
                    }).then(function() {
                        // 开启加载状态
                        self.isLoading = true;
                        
                        $.ajax({
                            url: serviceUrl + '/api/pda/FirstInspection4',
                            type: 'POST',
                            data: param,
                            contentType: "application/x-www-form-urlencoded",
                            dataType: 'json',
                            beforeSend: function(XMLHttpRequest) {
                                XMLHttpRequest.setRequestHeader("token", localStorage.token);
                                XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
                            },
                            success: function(res) {
                                // 关闭加载状态
                                self.isLoading = false;
                                
                                if (res.code == 200) {
                                    self.$dialog.alert({
                                        title: '提示',
                                        message: '操作成功!'
                                    }).then(function() {
                                        // 可以在这里添加成功后的操作，比如重置表单或返回上一页
                                    })
                                } else {
                                    self.$toast(res.msg);
                                }
                            },
                            error: function() {
                                // 关闭加载状态
                                self.isLoading = false;
                                self.$toast('网络异常');
                            },
                            complete: function() {
                                // 兜底关闭加载状态，防止异常情况下加载状态一直显示
                                self.isLoading = false;
                            }
                        })
                    }).catch(function() {
                        // 取消确认时也关闭加载状态
                        self.isLoading = false;
                    });
                },
                //重置
                reset: function() {
                    var self = this;
                    self.$dialog.confirm({
                        title: '提示',
                        message: '是否确认重置?',
                    }).then(function() {
                        window.location.reload();
                    }).catch(function() {
                        // on cancel
                    });
                },
                //是否触发回车	
                onEnter: function(type) {
                    var self = this;
                    switch (type) {
                        case 0: {
                            self.onFocus(type);
                        }
                        case 1: //工卡			
                            self.onFocus(type);
                            break;
                        case 2:
                            this.getCardInfo();
                            break;
                        case 4: //缺陷
                            var isExist = false;
                            for (var index = 0; index < self.reasons.length; index++) {
                                var element = self.reasons[index];
                                if (self.txtReason == element) {
                                    isExist = true;
                                    break;
                                }
                            }
                            if (!isExist) {
                                self.reasons.push(self.txtReason)
                            } else {
                                self.$toast('已扫描过相同缺陷');
                            }
                            self.txtReason = ''
                            break;
                    }
                },
                //获取卡号信息
                getCardInfo() {
                    console.log(this.materialContent);
                    var self = this;
                    $.ajax({
                        url: serviceUrl + '/api/pda/getCardContent',
                        type: 'GET',
                        data: {
                            cardID: self.materialContent,
                            equipmentCode: self.locationCode,
                            type: 24,
                            kind: 1
                        },
                        contentType: "application/x-www-form-urlencoded",
                        dataType: 'json',
                        beforeSend: function(XMLHttpRequest) {
                            XMLHttpRequest.setRequestHeader("token", localStorage.token);
                            XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
                        },
                        success: function(res) {
                            if (res.code == 200) {
                                console.log(res.data);
                                self.errorMsg1 = ''
                                self.$refs.filed2.focus();
                                self.pModel = res.data.cardInfo.PModel;
                                self.materialContent = res.data.cardInfo.CardID;
                                self.package = res.data.cardInfo.PackageCode;
                                self.packageLimits = res.data.packageLimits;
                                console.log(self.package);
                                console.log(self.packageLimits);
                            } else {
                                self.$toast(res.msg);
                                self.$refs.filed2.focus();
                            }
                        },
                        error: function() {
                            self.$toast('网络异常');
                            self.materialContent = '';
                            self.$refs.filed2.focus();
                        }
                    })
                },
                //自动触发焦点聚焦
                onFocus: function(type) {
                    var self = this;
                    if (type == 0) {
                        self.$refs.filed1.focus();
                    } else if (type == 1) {
                        self.$refs.filed2.focus();
                    } else if (type == 2) {
                        // self.$refs.filed1.focus();
                    }
                },
                //删除
                onDelete: function(type, index) {
                    var self = this;
                    self.reasons.splice(index, 1)
                },
            }
        })
        Vue.config.devtools = true; //允许进行调试
    </script>
</body>
</html>
