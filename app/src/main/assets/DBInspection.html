<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="black" name="apple-mobile-web-app-status-bar-style">
		<meta content="telephone=no" name="format-detection">
		<title>IC首检</title>
		<!-- 引入 Vue 和 Vant 的 JS 文件 -->
		<script src="js/jquery.min.js"></script>
		<script src="js/vue.min.js"></script>
		<script src="js/vant.min.js"></script>
		<script src="js/common.js"></script>
		<link rel="stylesheet" href="styles/style.css" />
		<!-- 引入样式文件 -->
		<link rel="stylesheet" href="styles/vant.css" />
	</head>

	<body>
		<div id="app">
			<div>
				<van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
			</div>


			<div>
				<van-field v-model="time" label="日期时间" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<div id='no'>
				<van-field v-model="locationCode" label="设备编号" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					autofocus required :error-message="errorMsg1" error-message-align="right"
					@keyup.enter.native="onEnter(1)" />
			</div>
			<div>

				<van-field label="班别" input-align="right">
					<template #input>
						<van-radio-group v-model="clazz" direction="horizontal">
							<van-radio name="A">A</van-radio>
							<van-radio name="B">B</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div class='no'>
				<van-field v-model="Inspector" label="点检人" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>


			<!-- 	<div>
				<van-field label="是否开机" input-align="right">
					<template #input>
						<van-radio-group v-model="isOn" direction="horizontal">
							<van-radio name="开机">开机</van-radio>
							<van-radio name="未开机">未开机</van-radio>

						</van-radio-group>
					</template>
				</van-field>
			</div> -->

			<div class='no'>

				<van-field label="1.离子风扇功能" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode1" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>

			<div class='no'>

				<van-field label="2.离子风扇方向" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode2" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>

			<div class='no'>

				<van-field label="3.芯片背痕确认结果" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode3" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>


			<div class='no'>
				<van-field v-model="freeCode4" label="4.芯片粘贴" input-align="right" placeholder="请输入" ref="filed4"
					error-message-align="right" />
			</div>

			<div class='no'>
				<van-field v-model="freeCode5" label="5.气压：ASM/微恒 0.3~0.7MPA 新益昌3~7bar" input-align="right"
					placeholder="请输入" ref="filed5" error-message-align="right" />

			</div>

			<div class='no'>

				<van-field v-model="freeCode6" label="6.真空 -100~-60KPA" input-align="right" placeholder="请输入"
					ref="filed5" error-message-align="right" />
			</div>

			<div class='no'>

				<van-field label="7.打线图核对" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode7" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>

			<div class='no'>

				<van-field label="8.流程卡要求装片方式" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode8" direction="horizontal">
							<van-radio name="INK">INK</van-radio>
							<van-radio name="MAP">MAP</van-radio>
							<van-radio name="盲封">盲封</van-radio>
							<van-radio name="插花">插花</van-radio>

						</van-radio-group>
					</template>
				</van-field>
			</div>

			<div class='no'>

				<van-field label="9.实际装片方式" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode9" direction="horizontal">
							<van-radio name="INK">INK</van-radio>
							<van-radio name="MAP">MAP</van-radio>
							<van-radio name="盲封">盲封</van-radio>
							<van-radio name="插花">插花</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div>
				<van-row id="size" class="flex-container">
					<van-col span="4"
						style="display: flex; justify-content: center; align-items: center; writing-mode: vertical-rl; text-orientation: upright;">
						顶针高度
					</van-col>
					<van-col span="19" class="flex-field-col">
						<van-row>
							<label>（GS100/微恒：工作位-待工作位）</label>
						</van-row>
						<van-row>
							<van-field v-model="freeCode10" label="10.左" input-align="right" placeholder="请输入"
								error-message-align="right" type='number' />

						</van-row>
						<van-row>
							<van-field v-model="freeCode11" label="11.右" input-align="right" placeholder="请输入"
								error-message-align="right" type='number' />
						</van-row>


					</van-col>
				</van-row>
			</div>
			<div>
				<van-row id="size" class="flex-container">
					<van-col span="4"
						style="display: flex; justify-content: center; align-items: center; writing-mode: vertical-rl; text-orientation: upright;">
						摆臂机粘胶高度
					</van-col>
					<van-col span="19" class="flex-field-col">
					
						<van-row>
							<van-field v-model="freeCode12" label="12.左" input-align="right" placeholder="请输入"
								error-message-align="right" type='number' />

						</van-row>
						<van-row>
							<van-field v-model="freeCode13" label="13.右" input-align="right" placeholder="请输入"
								error-message-align="right" type='number' />
						</van-row>


					</van-col>
				</van-row>
			</div>
			<div class='no'>
				<van-field label="14.设备状态标识牌是否一致" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode14" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>

			<div class='no'>
				<van-field v-model="Remarks" label="备注" input-align="right" placeholder="请输入" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<van-tag type="success" size="large">{{tag}}</van-tag>

			<div class="btm_btn">
				<van-row>
					<van-col span="10">
						<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" block square @click="save">{{btnName}}</van-button>
					</van-col>
				</van-row>
			</div>


		</div>
		<script>
			new Vue({
				el: '#app',
				data: {
					type: '', //物料类型
					btnName: '确认',
					showPicker: false,
					columns: [],
					errorMsg1: "",
					errorMsg2: "",

					qc: '',
					qcCode: '',
					locationCode: '', //货架
					materialContent: '', //条码内容
					pModel: "",
					time: "",
					remark: '',
					judgment: '',
					tag: "",
					clazz: '',

					Remarks: '',


					// 机台台面（排线下）状态（正常/异常）
					machineTable: '',
					// 是否手动下发程序（是/否）
					isManualProgramIssue: '',
					testContent: '',
					Inspector: '',
					ConfirmOnSpot: '',
					leaderConfirms: '',


					// 输入字段值
					freeCode1: '',
					freeCode2: '',
					freeCode3: '',
					freeCode4: '',
					freeCode5: '',
					freeCode6: '',
					freeCode7: '',
					freeCode8: '',
					freeCode9: '',
					freeCode10: '',
					freeCode11: '',
					freeCode12: '',
					freeCode13: '',
					freeCode14: '',
					freeCode15: '',

				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.qcCode = localStorage.userCode;
					this.Inspector = localStorage.userName;

				},
				created() {

					var type = getQueryVariable('type'); //线边仓库类型或仓库类型	
					var materialContent = getQueryVariable('CardID') || ""; //线边仓库类型或仓库类型
					var locationCode = getQueryVariable('EquipmentCode') || ""; //线边仓库类型或仓库类型


					this.title = 'ICDB 点检'

					if (locationCode != null) {
						this.materialContent = materialContent
						this.locationCode = locationCode
					}

				},
				methods: {

					istestDataOfRange(value) {
						return value !== '' && (parseFloat(value) > 30 || parseFloat(value) < 0);
					},
					onConfirmInspectionType(value) {
						this.inspectionType = value;
					},
					onCancelInspectionType() {
						this.inspectionType = '';
					},
					getNowTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.time = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					showPopup() {
						this.showPicker = true;
					},


					backLast: function() {
						window.location.href = "javascript:history.go(-1)";
					},

					//出入库提交
					save: function() {
						var self = this;
						var param = {
							clazz: self.clazz,
							EquipmentCode: self.locationCode, // 货架
						
							freeCode1: self.freeCode1,
							freeCode2: self.freeCode2,
							freeCode3: self.freeCode3,
							freeCode4: self.freeCode4,
							freeCode5: self.freeCode5,
							freeCode6: self.freeCode6,
							freeCode7: self.freeCode7,
							freeCode8: self.freeCode8,
							freeCode9: self.freeCode9,
							freeCode10: self.freeCode10,
							freeCode11: self.freeCode11,
							freeCode12: self.freeCode12,
							freeCode13: self.freeCode13,
							freeCode14: self.freeCode14,
							Inspector: self.Inspector,

							Remarks: self.Remarks,


						}
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认提交?',
						}).then(function() {
							$.ajax({
								url: serviceUrl + '/api/pda/dbinspection',
								type: 'POST',
								data: param,
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage
										.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.$dialog.alert({
											title: '提示',
											message: '操作成功!'
										}).then(function() {

											// 重置所有属性
											self.locationCode = '';
											self.materialContent = '';
											self.errorMsg1 = '';
											self.errorMsg2 = '';
											self.pModel = '';
											self.getNowTime();



										})
									} else {
										self.$toast(res.msg);

									}
								},
								error: function() {
									self.$toast('网络异常');
								}
							})
						}).catch(function() {
							// on cancel
						});
					},

					//重置
					reset: function() {
						var self = this;
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认重置?',
						}).then(function() {

							// 重置所有属性
							self.locationCode = '';
							self.materialContent = '';
							self.errorMsg1 = '';
							self.errorMsg2 = '';
							self.pModel = '';
							self.getNowTime();

							self.remark = '';
							self.judgment = '';
							self.package = '';
							self.clazz = ''
							self.testData1 = ''
							self.testData2 = ''
							self.testData3 = ''

						}).catch(function() {
							// on cancel
						});
					},

					//是否触发回车	
					onEnter: function(type) {
						var self = this;
						switch (type) {
							case 0: {
								self.onFocus(type);
							}
							case 1: //工卡			
								self.onFocus(type);
								break;
							case 2:
								this.getCardInfo();
								break;
							case 4: //缺陷

								var isExist = false;
								for (var index = 0; index < self.reasons.length; index++) {
									var element = self.reasons[index];
									if (self.txtReason == element) {
										isExist = true;
										break;
									}
								}
								if (!isExist) {
									self.reasons.push(self.txtReason)
								} else {
									self.$toast('已扫描过相同缺陷');
								}
								self.txtReason = ''

								break;
						}
					},

					//获取卡号信息
					getCardInfo() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getCardContent',
							type: 'GET',
							data: {
								cardID: self.materialContent,
								equipmentCode: self.locationCode,
								type: 21,
								kind: 1
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg1 = ''
									self.$refs.filed2.focus();
									// self.locationCode = res.data.EquipmentCode;
									self.pModel = res.data.PModel;
									self.materialContent = res.data.CardID;
									self.package = res.data.PackageName;

								} else {
									self.$toast(res.msg);

									self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},

					//自动触发焦点聚焦
					onFocus: function(type) {
						var self = this;
						if (type == 0) {
							self.$refs.filed1.focus();
						} else if (type == 1) {
							self.$refs.filed2.focus();
						} else if (type == 2) {
							// self.$refs.filed1.focus();
						}
					},
					onConfirmPopup(value) {
						this.showPicker = false;
					},
					//删除
					onDelete: function(type, index) {
						var self = this;
						self.reasons.splice(index, 1)
					},

				}
			})
			Vue.config.devtools = true; //允许进行调试
		</script>
		<style>
			.row {
				display: flex;
				align-items: center;
				margin-bottom: 10px;
			}

			.field-label {
				margin-right: 10px;
				margin-right: 16px;
				font-size: 14px;
				color: #323233da;
				line-height: 32px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.flex-container {
				display: flex;
				align-items: center;
			}

			.flex-label-col {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100px;
				/* 根据需要调整高度 */
			}

			.flex-field-col {
				display: flex;
				flex-direction: column;
				justify-content: space-around;
			}

			.custom-van-field {
				background-color: rgb(255, 255, 255);
				/* padding: 10px; */
				display: inline-flex;
				justify-content: space-between;
				width: 100%;
			}
		</style>
	</body>
</html>
