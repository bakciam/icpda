<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="black" name="apple-mobile-web-app-status-bar-style">
    <meta content="telephone=no" name="format-detection">
    <title>IC前工序夹具领用归还</title>
    <!-- 引入 Vue 和 Vant 的 JS 文件 -->
    <script src="js/jquery.min.js"></script>
    <script src="js/vue.min.js"></script>
    <script src="js/vant.min.js"></script>
    <script src="js/common.js"></script>
    <link rel="stylesheet" href="styles/style.css" />
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="styles/vant.css" />
</head>

<body>
    <div id="app">
        <div>
            <van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
        </div>
        <!-- <div>
				<van-cell value="1.检查频率：首检，1次/机台/班，设备维修/调整参数，外观不良每次10条；" />
			</div> -->

        <div>
            <van-field v-model="time" label="日期时间" input-align="right" placeholder="请输入" ref="filed1" required
                :error-message="errorMsg1" error-message-align="right" />
        </div>
        <div>
            <van-field readonly clickable name="picker" input-align="right" :value="value" label="项目类型"
                placeholder="点击选择类型" @click="showPicker = true" />
        </div>


        <div id='no'>
            <van-field v-model="locationCode" label="机台编号" input-align="right" placeholder="请输入或扫描设备" 
                required  />
        </div>

        <div class='no'>
            <van-field v-model="packageType" label="封装类型" input-align="right" placeholder="请输入" :error-message="errorMsg1"
                error-message-align="right" />
        </div>
        <div class='no'>
            <van-field v-model="fixtureCode" label="夹具编码" input-align="right" placeholder="请输入" :error-message="errorMsg1"
                error-message-align="right" />
        </div>
        <div class='no'>
            <van-field v-model="userName" label="人员" input-align="right" placeholder="请输入" :error-message="errorMsg1"
                error-message-align="right" />
        </div>
        <div class='no'>
            <van-field v-model="remark" label="备注" input-align="right" placeholder="请输入" />
        </div>
        <van-tag type="success" size="large">{{tag}}</van-tag>


        <div class="btm_btn">
            <van-popup v-model="showPicker" position="bottom">
                <van-picker show-toolbar :columns="columns" @confirm="onConfirm" @cancel="showPicker = false" />
            </van-popup>

            <van-row>
                <van-col span="10">
                    <van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
                </van-col>
                <van-col span="14">
                    <van-button type="info" block square @click="save">{{btnName}}</van-button>
                </van-col>
            </van-row>


        </div>


    </div>
    <script>
        new Vue({
            el: '#app',
            data: {
                btnName: '确认',
                showPicker: false,
                columns: ['领用', '归还'],
                locationCode: '',
                packageType: '',
                fixtureCode: '',
                userName: '',
				userCode: '',
                errorMsg1: "",
                time: "",
                remark: '',
                value: '领用',
                title: '',
				tag:''
            },
            //封装好的方法挂载到mounted里面
            mounted: function (data) {
                this.getNowTime();
                this.userCode = localStorage.userCode;
                this.userName = localStorage.userName;

            },
            created() {
                this.title = 'IC前工序夹具领用归还'
            },
            methods: {
                onConfirm(value) {
                    this.value = value;
                    this.showPicker = false;
                },
                getNowTime() {
                    let now = new Date();
                    let year = now.getFullYear();
                    let month = (now.getMonth() + 1).toString().padStart(2, '0');
                    let day = now.getDate().toString().padStart(2, '0');
                    let hours = now.getHours().toString().padStart(2, '0');
                    let minutes = now.getMinutes().toString().padStart(2, '0');
                    let seconds = now.getSeconds().toString().padStart(2, '0');
                    this.time = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
                },
                backLast: function () {
                    window.location.href = "javascript:history.go(-1)";
                },

                //提交
                save: function () {
                    var self = this;
                    var param = {
                        locationCode: self.locationCode,
                        projectType: self.value,
                        packageType: self.packageType,
                        fixtureCode: self.fixtureCode,
                        userCode: self.userCode,
                        userName: self.userName,
                        time: self.time,
                        remark: self.remark
                    }
                    self.$dialog.confirm({
                        title: '提示',
                        message: '是否确认提交?',
                    }).then(function () {
                        $.ajax({
                            url: serviceUrl + '/api/pda/PostIcFixtureBorrowReturn',
                            type: 'POST',
                            data: param,
                            contentType: "application/x-www-form-urlencoded",
                            dataType: 'json',
                            beforeSend: function (XMLHttpRequest) {
                                XMLHttpRequest.setRequestHeader("token", localStorage.token);
                                XMLHttpRequest.setRequestHeader("secret", localStorage
                                    .secret);
                            },
                            success: function (res) {
                                if (res.code == 200) {
                                    self.$dialog.alert({
                                        title: '提示',
                                        message: '操作成功!'
                                    }).then(function () {

                                        self.reset()
                                    })
                                } else {
                                    self.$toast(res.msg);

                                }
                            },
                            error: function () {
                                self.$toast('网络异常');
                            }
                        })
                    }).catch(function () {
                        // on cancel
                    });
                },

                //重置
                reset: function () {
                    var self = this;
                    self.$dialog.confirm({
                        title: '提示',
                        message: '是否确认重置?',
                    }).then(function () {
                        self.locationCode = '';
                        self.packageType = '';
                        self.fixtureCode = '';
                        self.staff = '';
                        self.remark = '';
                        self.getNowTime();
                    }).catch(function () {
                        // on cancel
                    });
                },

            }
        })
        Vue.config.devtools = true; //允许进行调试
    </script>
    <style>
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .field-label {
            margin-right: 10px;
            margin-right: 16px;
            font-size: 14px;
            color: #323233da;
            line-height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .flex-container {
            display: flex;
            align-items: center;
        }

        .flex-label-col {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
            /* 根据需要调整高度 */
        }

        .flex-field-col {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .custom-van-field {
            background-color: rgb(255, 255, 255);
            /* padding: 10px; */
            display: inline-flex;
            justify-content: space-between;
            width: 100%;
        }
    </style>
</body>

</html>
