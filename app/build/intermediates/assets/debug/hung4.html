		<script>
			new Vue({
				el: '#app',
				data: {
					type: '', //物料类型
					showScan: false,
					btnName: '确认',
					qc: '',

					time: "",

					errorMsg1: "",

					locationCode: '',

					package: '',

					shoujian: '',
					jilubiao: '',
					partNumber: '',
					waiguan: '',
					comment: '',

					long: '',
					long2: '',
					long3: '',
					long4: '',
					long5: '',
					longLeft: '',
					longLeft2: '',
					longLeft3: '',
					longLeft4: '',
					longLeft5: '',
					longRight: '',
					longRight2: '',
					longRight3: '',
					longRight4: '',
					longRight5: '',
					higt: '',
					higt2: '',
					higt3: '',
					higt4: '',
					higt5: '',
					higt1: '',
					higt12: '',
					higt13: '',
					higt14: '',
					higt15: '',
					l1: '',
					l12: '',
					l13: '',
					l14: '',
					l15: '',
					allLenth1: '',
					allLenth2: '',
					allLenth3: '',
					allLenth4: '',
					allLenth5: '',
					// 左侧共面性（对应数据库 leftCoplanarity1-5）
					leftCoplanarity1: "",
					leftCoplanarity2: "",
					leftCoplanarity3: "",
					leftCoplanarity4: "",
					leftCoplanarity5: "",

					// 右侧共面性（对应数据库 rightCoplanarity1-5）
					rightCoplanarity1: "",
					rightCoplanarity2: "",
					rightCoplanarity3: "",
					rightCoplanarity4: "",
					rightCoplanarity5: "",
					pName: '',
					vacuumPressure: '',
					compressedAir: '',
					forwardControlRecordTable: '',
					productionRecordTable: '',
					shebeikouya: [],
					wuliaokouya: [],
					judgment: '',
					thisData: {
						FullLengthLeft: null,
						FullLengthRight: null,
						LandingHeightStandardLeft: null,
						LandingHeightStandardRight: null,
						LeftSideStandardLeft: null,
						LeftSideStandardRight: null,
						PinPlanarityStandard: null,
						L1Left: null,
						L1Right: null,
						RightSideStandardLeft: null,
						RightSideStandardRight: null,
						AllLengthLeft: null,
						AllLengthRight: null,

					},
					sizeMeasurements: '',
					machineControl: '',
					xunjian: '',
					ps: '',
					tag: '',

				},
				watch: {
					shoujian(newVal) {
						if (newVal) {
							this.xunjian = null; // 如果选择了首检，则清空巡检
						}
					},
					xunjian(newVal) {
						if (newVal) {
							this.shoujian = null; // 如果选择了巡检，则清空首检
						}
					},
				},
				computed: {
					isVacuumPressureOutOfRange() {
						const min = -10;
						const max = -1.5;
						return this.vacuumPressure !== '' && (parseFloat(this.vacuumPressure) < min || parseFloat(this
							.vacuumPressure) > max);
					},
					isCompressedAirOutOfRange() {
						const min = 0.4;
						const max = 0.65;
						return this.compressedAir !== '' && (parseFloat(this.compressedAir) < min || parseFloat(this
							.compressedAir) > max);
					}

				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.qcCode = localStorage.userCode;
					this.qc = localStorage.userName;
				},
				created() {
					var type = getQueryVariable('type'); //线边仓库类型或仓库类型	
					this.type = type ? type : '4';
