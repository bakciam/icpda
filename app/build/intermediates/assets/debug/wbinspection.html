<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="black" name="apple-mobile-web-app-status-bar-style">
		<meta content="telephone=no" name="format-detection">
		<title>IC首检</title>
		<!-- 引入 Vue 和 Vant 的 JS 文件 -->
		<script src="js/jquery.min.js"></script>
		<script src="js/vue.min.js"></script>
		<script src="js/vant.min.js"></script>
		<script src="js/common.js"></script>
		<link rel="stylesheet" href="styles/style.css" />
		<!-- 引入样式文件 -->
		<link rel="stylesheet" href="styles/vant.css" />
	</head>

	<body>
		<div id="app">
			<div>
				<van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
			</div>
			<div>
				<!-- <van-cell value="频率：每批" /> -->
			</div>

			<div class='no'>
				<van-field v-model="qc" label="操机人员" input-align="right" placeholder="请输入"  ref="filed1"
					required :error-message="errorMsg1" error-message-align="right" />
			</div>
			<div>
				<van-field v-model="materialContent" label="工卡号" autofocus input-align="right" placeholder="请输入或扫描工卡号"
					@keyup.enter.native="onEnter(2)" ref="filed2" required :error-message="errorMsg2"
					error-message-align="right" />
			</div>
			<div id='no'>
				<van-field v-model="locationCode" label="机台号" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					required :error-message="errorMsg1" error-message-align="right" 
					@keyup.enter.native="onEnter(1)" />
			</div>
			<div>
				<van-field disabled v-model="pModel" label="产品名称" input-align="right" placeholder="请输入"
					@keyup.enter.native="onEnter(1)"  ref="filed1" required :error-message="errorMsg1"
					error-message-align="right" />
			</div>
			<div>

				<van-field v-model="starttime" label="开始时间" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<div class='no'>
				<van-field v-model="drawingVersion" label="图纸版本号" input-align="right" placeholder="请输入" ref="filed1"
					required error-message-align="right" />
			</div>

			<div class='no'>
				<van-field v-model="wireSize" label="铜线尺寸" input-align="right" placeholder="请输入" ref="filed2" required
					error-message-align="right" />
			</div>

			<div class='no'>
				<van-field v-model="inQty" label="来料数量（K数）" :label-width="260" input-align="right" placeholder="请输入"
					ref="filed3" required error-message-align="right" />
			</div>
			<div>

				<van-field v-model="endtime" label="结束时间" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>

			<div class='no'>
				<van-field v-model="defectiveQuantity" label="不良数量" input-align="right" placeholder="请输入" ref="filed4"
					required error-message-align="right" />
			</div>

			<div class='no'>
				<van-field v-model="outQty" label="产出数量/K" input-align="right" placeholder="请输入" ref="filed5" required
					error-message-align="right" />

			</div>
			<div class='no'>
				<van-field v-model="boxCodes" label="料盒号1" input-align="right" placeholder="请输入" ref="filed1"
					error-message-align="right" />
			</div>
			<div class='no'>
				<van-field v-model="boxCode2" label="料盒号2" input-align="right" placeholder="请输入" ref="filed1"
					error-message-align="right" />
			</div>
			<div class='no'>
				<van-field v-model="boxCode3" label="料盒号3" input-align="right" placeholder="请输入" ref="filed1"
					error-message-align="right" />
			</div>
			<div class='no'>
				<van-field v-model="boxCode4" label="料盒号4" input-align="right" placeholder="请输入" ref="filed1"
					error-message-align="right" />
			</div>

			<div class='no'>
				<van-field v-model="batchselfInspection" label="每批自检" input-align="right" placeholder="请输入" ref="filed2"
					required error-message-align="right" />
			</div>

			<div class='no'>
				<van-field v-model="yield" label="良率" input-align="right" placeholder="请输入" ref="filed3" required
					error-message-align="right" />
			</div>

			<div class='no'>
				<van-field v-model="status" label="状态" input-align="right" placeholder="请输入" 
					error-message-align="right" />
			</div>


			<div class='no'>
				<van-field v-model="remark" label="备注" input-align="right" placeholder="请输入"  
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<van-tag type="success" size="large">{{tag}}</van-tag>

			<div class="btm_btn">
				<van-row>
					<van-col span="10">
						<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" block square @click="save">{{btnName}}</van-button>
					</van-col>
				</van-row>
			</div>
			<van-popup v-model="showPicker" position="bottom">
				<van-picker show-toolbar :columns="columns" @cancel="showPicker = false" @confirm="onConfirmPopup"
					value-key="storeName" />
			</van-popup>

		</div>
		<script>
			new Vue({
				el: '#app',
				data: {
					type: '', //物料类型
					btnName: '确认',
					showPicker: false,
					columns: [],
					qc: '',
					qcCode: '',

					locationCode: '', //货架
					materialContent: '', //条码内容
					errorMsg1: "",
					errorMsg2: "",
					pModel: "",
					time: "",
					package: "",
					remark: '',
					shebeikouya: [],
					wuliaokouya: [],

					tag: "",

					starttime: '',
					drawingVersion: '',
					wireSize: '',
					inQty: '',
					endtime: '',
					defectiveQuantity: '',
					outQty: '',
					boxCodes: '',
					boxCode2: '',
					boxCode3: '',
					boxCode4: '',
					batchselfInspection: '',
					yield: '',
					status:'',
					

				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.qcCode = localStorage.userCode;
					this.qc = localStorage.userName;

				},
				created() {

					var type = getQueryVariable('type'); //线边仓库类型或仓库类型	
					var materialContent = getQueryVariable('CardID') || ""; //线边仓库类型或仓库类型
					var locationCode = getQueryVariable('EquipmentCode') || ""; //线边仓库类型或仓库类型


					this.title = 'IC焊线生产记录'

					if (locationCode != null) {
						this.materialContent = materialContent
						this.locationCode = locationCode
					}

				},
				methods: {

					getNowTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.time = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					showPopup() {
						this.showPicker = true;
					},


					backLast: function() {
						window.location.href = "javascript:history.go(-1)";
					},

					//出入库提交
					save: function() {
						var self = this;
						var param = {
							cardID: self.materialContent,
							equipmentCode: self.locationCode,
							time: self.time,
							qc: localStorage.userName,
							qcCode: localStorage.userCode,
							remark: self.remark,
							starttime: self.starttime,
							drawingVersion: self.drawingVersion,
							wireSize: self.wireSize,
							inQty: self.inQty,
							endtime: self.endtime,
							defectiveQuantity: self.defectiveQuantity,
							outQty: self.outQty,
							boxCodes: self.boxCodes,
							boxCode2: self.boxCode2,
							boxCode3: self.boxCode3,
							boxCode4: self.boxCode4,
							batchselfInspection: self.batchselfInspection,
							yield: self.yield,
							status:self.status,
						}
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认提交?',
						}).then(function() {
							$.ajax({
								url: serviceUrl + '/api/pda/Postwbinspection',
								type: 'POST',
								data: param,
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage
										.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.$dialog.alert({
											title: '提示',
											message: '操作成功!'
										}).then(function() {

											// self.reset()
										})
									} else {
										self.$toast(res.msg);

									}
								},
								error: function() {
									self.$toast('网络异常');
								}
							})
						}).catch(function() {
							// on cancel
						});
					},

					//删除
					onDelete: function(type, index) {
						var self = this;

						self.reasons.splice(index, 1)




					},
					//重置
					reset: function() {
						var self = this;
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认重置?',
						}).then(function() {

							// 重置所有属性
							self.locationCode = '';
							self.materialContent = '';
							self.errorMsg1 = '';
							self.errorMsg2 = '';
							self.pModel = '';

							self.getNowTime();

						}).catch(function() {
							// on cancel
						});
					},

					//是否触发回车	
					onEnter: function(type) {
						var self = this;
						switch (type) {
							case 0:
								self.onFocus(type);
								break;
							case 1: //工卡			
								self.onFocus(type);
								break;
							case 2:
								this.getCardInfo();
								break;
							case 4: //缺陷

								var isExist = false;
								for (var index = 0; index < self.reasons.length; index++) {
									var element = self.reasons[index];
									if (self.txtReason == element) {
										isExist = true;
										break;
									}
								}
								if (!isExist) {
									self.reasons.push(self.txtReason)
								} else {
									self.$toast('已扫描过相同缺陷');
								}
								self.txtReason = ''

								break;
						}
					},

					//获取卡号信息
					getCardInfo() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getCardContent',
							type: 'GET',
							data: {
								cardID: self.materialContent,
								equipmentCode: self.locationCode,
								type: 23,
								kind: 3
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg1 = ''
									self.$refs.filed2.focus();
									self.inQty = res.data.cardInfo.LastStepQuantity;
									self.outQty = res.data.cardInfo.CurrentQuantity;
									self.defectiveQuantity = Number((self.inQty - self.outQty).toFixed(3));
									// 先判断除数是否为0，避免NaN
									self.yield = self.outQty !== 0 ?
										Number((self.outQty/self.inQty*100  ).toFixed(2)) :
										0; // 或根据业务需求设置默认值
									if (res.data.operationRecords.length != 0)
									self.starttime = res.data.operationRecords[0].OperationTime
									if (res.data.operationRecords1.length != 0)
									self.endtime = res.data.operationRecords1[0].OperationTime

									self.package = res.data.cardInfo.PackageName;
									self.pModel = res.data.cardInfo.PartName;
									self.materialContent = res.data.cardInfo.CardID;
									self.locationCode = res.data.cardInfo.EquipmentCode;
									self.actualLettering = res.data.cardInfo.CustomerCode;
									console.log(self.numberOfSample);
								} else {
									self.$toast(res.msg);

									self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},

					//自动触发焦点聚焦
					onFocus: function(type) {
						var self = this;
						if (type == 0) {
							self.$refs.filed1.focus();
						} else if (type == 1) {
							self.$refs.filed2.focus();
						} else if (type == 2) {
							// self.$refs.filed1.focus();
						}
					},
					onConfirmPopup(value) {


						this.showPicker = false;
					},

				}
			})
			Vue.config.devtools = true; //允许进行调试
		</script>
		<style>
			.row {
				display: flex;
				align-items: center;
				margin-bottom: 10px;
			}

			.field-label {
				margin-right: 10px;
				margin-right: 16px;
				font-size: 14px;
				color: #323233da;
				line-height: 32px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.flex-container {
				display: flex;
				align-items: center;
			}

			.flex-label-col {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100px;
				/* 根据需要调整高度 */
			}

			.flex-field-col {
				display: flex;
				flex-direction: column;
				justify-content: space-around;
			}

			.custom-van-field {
				background-color: rgb(255, 255, 255);
				/* padding: 10px; */
				display: inline-flex;
				justify-content: space-between;
				width: 100%;
			}
		</style>
	</body>
</html>
