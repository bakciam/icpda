<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
	<meta content="yes" name="apple-mobile-web-app-capable">
	<meta content="black" name="apple-mobile-web-app-status-bar-style">
	<meta content="telephone=no" name="format-detection">
	<title>成品上架</title>
	<!-- 引入 Vue 和 Vant 的 JS 文件 -->
	<script src="js/jquery.min.js"></script>
	<script src="js/vue.min.js"></script>
	<script src="js/vant.min.js"></script>
	<script src="js/common.js"></script>
	<link rel="stylesheet" href="styles/style.css" />
	<!-- 引入样式文件 -->
	<link rel="stylesheet" href="styles/vant.css" />
</head>

<body>
	<div id="app">
		<div>
			<van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
		</div>
		<div>
			<div>
				<van-cell title="仓库名称" v-model="warehouseName" />
			</div>
			<div>
				<van-field v-model="locationCode" label="货架" input-align="right" placeholder="请输入或扫描货架"
					@keyup.enter.native="onEnter(1)" autofocus ref="filed1" required :error-message="errorMsg1"
					error-message-align="right" />
			</div>
			<div>
				<van-field v-model="boxCode" label="箱号" input-align="right" placeholder="请输入或扫描箱号"
					@keyup.enter.native="onEnter(2)" ref="filed2" required :error-message="errorMsg2"
					error-message-align="right" />
			</div>
		</div>
		<div>
			<van-cell-group title="箱号内容">
				<van-collapse v-model="activeNames">
				  <van-collapse-item v-for="(item,index) in contentInfo" :title="(index+1)+'、'+item.pModel" :name="index">
				  	<div><van-cell title="客户代码" v-model="customerCode" /></div>
					<div><van-cell title="封装形式" v-model="packageName" /></div>
					<div><van-cell title="产品型号" v-model="pModel" /></div>
					<div><van-cell title="产品数量" v-model="num" /></div>
				  </van-collapse-item>
				</van-collapse>
				
			</van-cell-group>
		</div>

		<div class="btm_btn">
			<van-row>
				<van-col span="10">
					<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
				</van-col>
				<van-col span="14">
					<van-button type="info" block square @click="save">{{btnName}}</van-button>
				</van-col>
			</van-row>
		</div>

	</div>
	<script>
		new Vue({
			el: '#app',
			data: {
				showScan: false,
				btnName: '确认',
				title: '成品上架',
				warehouseCode: '',
				warehouseName: '',
				locationCode: '',//货架
				boxCode: '',//箱号
				customerCode: '',
				packageName: '',
				pModel: '',
				num: '',
				errorMsg1: "",
				errorMsg2: "",
				contentInfo:[]
			},
			//封装好的方法挂载到mounted里面
			mounted: function (data) {

			},
			created() {

			},
			methods: {
				backLast: function () {
					window.location.href = "javascript:history.go(-1)";
				},

				//出入库提交
				save: function () {
					var self = this;
					var param = {
						boxcode: self.boxCode,
						locationcode: self.locationCode,
						modifyUser: localStorage.userCode,
						modifyUserName: localStorage.userName
					}
					self.$dialog.confirm({
						title: '提示',
						message: '是否确认提交?',
					}).then(function () {
						$.ajax({
							url: serviceUrl + '/api/pda/confirmboxmoveinfo',
							type: 'POST',
							data: param,
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function (XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function (res) {
								if (res.code == 200) {
									self.$dialog.alert({
										title: '提示',
										message: '操作成功!'
									}).then(function () {
										self.boxCode = '';
										self.errorMsg1 = '';										
										self.warehouseCode = '';
										self.warehouseName = '';
										self.contentInfo=[]
										self.$refs.filed2.focus();
									})
								} else {
									self.$toast(res.msg);
									self.$refs.filed2.focus();
								}
							},
							error: function () {
								self.$toast('网络异常');
							}
						})
					}).catch(function () {
						// on cancel
					});
				},

				//重置
				reset: function () {
					var self = this;
					self.$dialog.confirm({
						title: '提示',
						message: '是否确认重置?',
					}).then(function () {
						self.warehouseCode = '';
						self.warehouseName = '';
						self.locationCode = '';
						self.errorMsg1 = '';
						self.errorMsg2 = '';
						self.boxCode = '';
						self.contentInfo=[];
						self.$refs.filed1.focus();
					}).catch(function () {
						// on cancel
					});
				},

				//是否触发回车	
				onEnter: function (type) {
					var self = this;
					switch (type) {
						case 1: //入库单	
							self.onFocus(type);
							break;
						case 2: //箱号	
							if (self.locationCode == undefined || self.locationCode == '') {
								self.$toast('请先输入或扫描货架');
								self.boxCode = '';
								return;
							}
							self.warehouseName = '';
							self.customerCode = '';
							self.packageName = '';
							self.pModel = '';
							self.num = '';
							$.ajax({
								url: serviceUrl + '/api/pda/getboxcontentinfo',
								type: 'GET',
								data: {
									locationcode: self.locationCode,
									boxCode: self.boxCode
								},
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function (XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
								},
								success: function (res) {
									if (res.code == 200) {
										self.errorMsg1 = ''
										self.warehouseName = res.data.warehousename;
										self.customerCode = res.data.customercode;
										self.packageName = res.data.packagename;
										self.pModel = res.data.pmodel;
										self.num = res.data.qty;
									} else {
										self.$toast(res.msg);
										self.boxCode = '';
										self.$refs.filed2.focus();
									}
								},
								error: function () {
									self.$toast('网络异常');
									self.boxCode = '';
									self.$refs.filed2.focus();
								}
							})
							break;
						default:
							break;
					}
				},


				//自动触发焦点聚焦
				onFocus: function (type) {
					var self = this;
					if (type == 1) {
						self.$refs.filed2.focus();
					} else if (type == 2) {
						// self.$refs.filed2.blur();
					}
				},
			}
		})
	</script>
</body>

</html>
