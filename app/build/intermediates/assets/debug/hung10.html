<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="black" name="apple-mobile-web-app-status-bar-style">
		<meta content="telephone=no" name="format-detection">
		<title>IC首检</title>
		<!-- 引入 Vue 和 Vant 的 JS 文件 -->
		<script src="js/jquery.min.js"></script>
		<script src="js/vue.min.js"></script>
		<script src="js/vant.min.js"></script>
		<script src="js/common.js"></script>
		<link rel="stylesheet" href="styles/style.css" />
		<!-- 引入样式文件 -->
		<link rel="stylesheet" href="styles/vant.css" />
	</head>

	<body>
		<div id="app">
			<div>
				<van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
			</div>
			<div>
				<van-cell value="频率：每批" />
			</div>
			<div>

				<van-field v-model="time" label="日期时间" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			
			<div>
				<van-field v-model="materialContent" label="工卡号" input-align="right" placeholder="请输入或扫描工卡号"
					@keyup.enter.native="onEnter(2)" ref="filed2" required :error-message="errorMsg2"
					error-message-align="right" />
			</div>
			<div id='no'>
				<van-field v-model="humidityNumber" label="湿度卡批号" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					required :error-message="errorMsg1" error-message-align="right" autofocus
					@keyup.enter.native="onEnter(1)" />
			</div>
			<div id='no'>
				<van-field v-model="locationCode" label="机台号" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					required :error-message="errorMsg1" error-message-align="right" autofocus
					@keyup.enter.native="onEnter(1)" />
			</div>
			<div>
				<van-field disabled v-model="pModel" label="产品型号" input-align="right" placeholder="请输入"
					@keyup.enter.native="onEnter(1)" ref="filed1" :error-message="errorMsg1"
					error-message-align="right" />
			</div>
			<div>
				<van-field disabled v-model="package" label="封装类型" input-align="right" placeholder="请输入"
					@keyup.enter.native="onEnter(1)" ref="filed1" :error-message="errorMsg1"
					error-message-align="right" />
			</div>

			<div>
				<van-field v-model="numberOfSample" label="抽检数量" input-align="right" placeholder="请输入" />
			</div>
			<div>
		
				<van-field disabled v-model="actualLettering" label="客户代码" input-align="right" placeholder="请输入" />
				
			</div>
			
			<div>
		
				<van-field label="铝箔袋标签" input-align="right">
					<template #input>
						<van-radio-group v-model="pouchLabel" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
				<van-field label="内盒标签" input-align="right">
					<template #input>
						<van-radio-group v-model="innerBoxLabel" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field><van-field label="外箱标签" input-align="right">
					<template #input>
						<van-radio-group v-model="cartonLabel" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div class='no'>
				<van-field v-model="qc" label="品质人员" input-align="right" placeholder="请输入" autofocus ref="filed1" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			
			<div class='no'>
				<van-field v-model="remark" label="备注" input-align="right" placeholder="请输入" autofocus ref="filed1"
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<van-tag type="success" size="large">{{tag}}</van-tag>

			<div class="btm_btn">
				<van-row>
					<van-col span="10">
						<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" block square @click="save">{{btnName}}</van-button>
					</van-col>
				</van-row>
			</div>
			<van-popup v-model="showPicker" position="bottom">
				<van-picker show-toolbar :columns="columns" @cancel="showPicker = false" @confirm="onConfirmPopup"
					value-key="storeName" />
			</van-popup>
			<!--缺陷选择相关弹层-->
			<van-popup v-model="reasonspopup" position="right" :style="{ width: '80%',height:'100%' }">
				<div class="popup_list">
					<div class="popub_title">缺陷列表</div>
					<div class="pop_list">
						<van-checkbox-group v-model="selectedreasonsCode">
							<van-checkbox v-for="(item,index) in popupreasonsList" :name="item">
								<div class="row_line">{{item}}</div>
							</van-checkbox>
						</van-checkbox-group>
					</div>
				</div>
				<van-row class="popup_fixed_btn">
					<van-col span="10">
						<van-button color="#ccc" square block @click="reasonspopup=false">取消</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" square block @click="confirmPopupreasons">确认选择</van-button>
					</van-col>
				</van-row>
			</van-popup>
		</div>
		<script>
			new Vue({
				el: '#app',
				data: {
					type: '', //物料类型
					btnName: '确认',
					showPicker: false,
					columns: [],
					qc: '',
					qcCode: '',

					locationCode: '', //货架
					materialContent: '', //条码内容
					errorMsg1: "",
					errorMsg2: "",
					pModel: "",
					time: "",
					package: "",
					remark: '',
					shebeikouya: [],
					wuliaokouya: [],
					judgment: '',
					actualLettering: "",
					objectionableContent: "OK",

					numberOfSample: 0,
					txtReason: "",
					reasons: [],
					reasonspopup: false,
					popupreasonsList: [
						"反带/反向",
						"空位",
						"偏/断/烂带",
						"盖带拉丝",
						"翻料",
						"刻字不良",
						"引脚不良",
						"塑封体不良",
						"混料"
					],
					selectedreasonsCode: "",
					reel: '',
					tape: '',
					requirement: '',
					cartonLabel: 'OK',
					innerBoxLabel: 'OK',
					pouchLabel: 'OK',
					reelLabel: '',
					tag: "No:JDW-WI-P-M009-01(b)",
					humidityNumber:''


				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.qcCode = localStorage.userCode;
					this.qc = localStorage.userName;

				},
				created() {

					var type = getQueryVariable('type'); //线边仓库类型或仓库类型	
					var materialContent = getQueryVariable('CardID') || ""; //线边仓库类型或仓库类型
					var locationCode = getQueryVariable('EquipmentCode') || ""; //线边仓库类型或仓库类型


					this.title = 'IC包装生产记录'

					if (locationCode != null) {
						this.materialContent = materialContent
						this.locationCode = locationCode
					}

				},
				methods: {
					//确认选择缺陷
					confirmPopupreasons: function() {
						var self = this;
						if (this.selectedreasonsCode.length == 0) {
							self.$toast('请先选择缺陷！');
							return
						}
						var hasRepeat = false
						for (var index = 0; index < self.selectedreasonsCode.length; index++) {
							var element = self.selectedreasonsCode[index];
							var bf1 = false;
							for (var k = 0; k < self.reasons.length; k++) {
								var item = self.reasons[k];
								if (item == element) {
									bf1 = true;
									break;
								}
							}
							if (bf1 == false) {
								for (var j = 0; j < self.popupreasonsList.length; j++) {
									var model1 = self.popupreasonsList[j];
									if (model1 == element) {
										self.reasons.push(model1);
									}
								}
							} else {
								hasRepeat = true;
							}
						}
						if (hasRepeat) {
							self.$toast('已为您筛选掉重复的缺陷！');
						}
						this.activeNames = ['4']
						this.reasonspopup = false;
					},
					//显示缺陷选择弹窗
					showreasonspopup: function() {
						this.reasonspopup = true;
						this.selectedreasonsCode = [];
					},


					onConfirmInspectionType(value) {
						this.inspectionType = value;
					},
					onCancelInspectionType() {
						this.inspectionType = '';
					},
					getNowTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.time = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					showPopup() {
						this.showPicker = true;
					},


					backLast: function() {
						window.location.href = "javascript:history.go(-1)";
					},

					//出入库提交
					save: function() {
						var self = this;
						var param = {
							cardID: self.materialContent,
							pModel: self.pModel,
							locationCode: self.locationCode,
							time: self.time,
							package: self.package,
							numberOfSamples: self.numberOfSample,
							actualLettering: self.actualLettering,
							reel: self.reel,
							tape: self.tape,
							requirement: self.requirement,
							cartonLabel: self.cartonLabel,
							innerBoxLabel: self.innerBoxLabel,
							pouchLabel: self.pouchLabel,
							reelLabel: self.reelLabel,
							reasons: self.reasons,
							judgment: self.judgment,
							qc: localStorage.userName,
							qcCode: localStorage.userCode,
							remark: self.remark,
							wuliaokouya: this.wuliaokouya.includes("NG") ? "NG" : "",
							shebeikouya: this.shebeikouya.includes("NG") ? "NG" : "",
							objectionableContent: self.objectionableContent,
							Tag: self.tag,
							humidityNumber:self.humidityNumber,
							tpye:"2"
						}
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认提交?',
						}).then(function() {
							$.ajax({
								url: serviceUrl + '/api/pda/FirstInspection2',
								type: 'POST',
								data: param,
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage
										.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.$dialog.alert({
											title: '提示',
											message: '操作成功!'
										}).then(function() {

											self.reset()
										})
									} else {
										self.$toast(res.msg);

									}
								},
								error: function() {
									self.$toast('网络异常');
								}
							})
						}).catch(function() {
							// on cancel
						});
					},

					//删除
					onDelete: function(type, index) {
						var self = this;

						self.reasons.splice(index, 1)




					},
					//重置
					reset: function() {
						var self = this;
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认重置?',
						}).then(function() {

							// 重置所有属性
							self.locationCode = '';
							self.materialContent = '';
							self.errorMsg1 = '';
							self.errorMsg2 = '';
							self.pModel = '';
							self.package = '';

							self.getNowTime();
							self.remark = '';
							self.shebeikouya = [];
							self.wuliaokouya = [];
							self.judgment = '';
							self.txtReason = '';
							self.reasons = [];
							self.selectedreasonsCode = '';
							self.reel = '';
							self.tape = '';
							self.requirement = '';
							self.cartonLabel = '';
							self.innerBoxLabel = '';
							self.pouchLabel = '';
							self.reelLabel = '';
							self.numberOfSamples = 0;
							self.objectionableContent = "OK";
							self.actualLettering = '';
							self.humidityNumber='';
						}).catch(function() {
							// on cancel
						});
					},

					//是否触发回车	
					onEnter: function(type) {
						var self = this;
						switch (type) {
							case 0:
								self.onFocus(type);
								break;
							case 1: //工卡			
								self.onFocus(type);
								break;
							case 2:
								this.getCardInfo();
								break;
							case 4: //缺陷

								var isExist = false;
								for (var index = 0; index < self.reasons.length; index++) {
									var element = self.reasons[index];
									if (self.txtReason == element) {
										isExist = true;
										break;
									}
								}
								if (!isExist) {
									self.reasons.push(self.txtReason)
								} else {
									self.$toast('已扫描过相同缺陷');
								}
								self.txtReason = ''

								break;
						}
					},

					//获取卡号信息
					getCardInfo() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getCardContent',
							type: 'GET',
							data: {
								cardID: self.materialContent,
								equipmentCode: self.locationCode,
								type: 22,
								kind: 1
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg1 = ''
									self.$refs.filed2.focus();
									self.numberOfSample = res.data.CurrentQuantity;
									self.package = res.data.PackageName;
									self.pModel = res.data.PModel;
									self.materialContent = res.data.CardID;
									self.locationCode = res.data.EquipmentCode;
									self.actualLettering=res.data.CustomerCode;
									console.log(self.numberOfSample);
								} else {
									self.$toast(res.msg);

									self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},

					//自动触发焦点聚焦
					onFocus: function(type) {
						var self = this;
						if (type == 0) {
							self.$refs.filed1.focus();
						} else if (type == 1) {
							self.$refs.filed2.focus();
						} else if (type == 2) {
							// self.$refs.filed1.focus();
						}
					},
					onConfirmPopup(value) {


						this.showPicker = false;
					},

				}
			})
			Vue.config.devtools = true; //允许进行调试
		</script>
		<style>
			.row {
				display: flex;
				align-items: center;
				margin-bottom: 10px;
			}

			.field-label {
				margin-right: 10px;
				margin-right: 16px;
				font-size: 14px;
				color: #323233da;
				line-height: 32px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.flex-container {
				display: flex;
				align-items: center;
			}

			.flex-label-col {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100px;
				/* 根据需要调整高度 */
			}

			.flex-field-col {
				display: flex;
				flex-direction: column;
				justify-content: space-around;
			}

			.custom-van-field {
				background-color: rgb(255, 255, 255);
				/* padding: 10px; */
				display: inline-flex;
				justify-content: space-between;
				width: 100%;
			}
		</style>
	</body>
</html>
