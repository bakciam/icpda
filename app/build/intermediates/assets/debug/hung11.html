<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="black" name="apple-mobile-web-app-status-bar-style">
		<meta content="telephone=no" name="format-detection">
		<title>IC首检</title>
		<!-- 引入 Vue 和 Vant 的 JS 文件 -->
		<script src="js/jquery.min.js"></script>
		<script src="js/vue.min.js"></script>
		<script src="js/vant.min.js"></script>
		<script src="js/common.js"></script>
		<link rel="stylesheet" href="styles/style.css" />
		<!-- 引入样式文件 -->
		<link rel="stylesheet" href="styles/vant.css" />
	</head>

	<body>
		<div id="app">
			<div>
				<van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
			</div>
			<div>
				<van-cell value="频率：每批" />
			</div>

			<div class='no'>
				<van-field v-model="qc" label="记录人员" input-align="right" placeholder="请输入" autofocus ref="filed1"
					required :error-message="errorMsg1" error-message-align="right" />
			</div>
			<div>
				<van-field v-model="materialContent" label="工卡号" input-align="right" placeholder="请输入或扫描工卡号"
					@keyup.enter.native="onEnter(2)" ref="filed2" required :error-message="errorMsg2"
					error-message-align="right" />
			</div>
			<div id='no'>
				<van-field v-model="locationCode" label="机台号" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					required @keyup.enter.native="onEnter(1)" />
			</div>
			<div>
				<van-field disabled v-model="package" label="封装类型" input-align="right" placeholder="请输入"
					@keyup.enter.native="onEnter(1)" ref="filed1" :error-message="errorMsg1"
					error-message-align="right" />
			</div>
			<div>
				<van-field disabled v-model="pModel" label="产品型号" input-align="right" placeholder="请输入"
					@keyup.enter.native="onEnter(1)" ref="filed1" :error-message="errorMsg1"
					error-message-align="right" />
			</div>


			<div>

				<van-field v-model="intime" label="开始时间" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right">
				</van-field>

			</div>
			<div>
				<van-field input-align="right" readonly clickable name="datetimePicker" :value="outtime" label="结束时间"
					placeholder="点击选择时间" @click="showPicker1 = true" />
			</div>
			<!-- <div>

				<van-field v-model="outtime" label="结束时间" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right">
				</van-field>

			</div> -->

			<div>
				<van-field required v-model="numberOfSample" label="投入/K" input-align="right" placeholder="请输入" />
			</div>
			<div>
				<van-field v-model="outNumberOfSample" label="产出/K" input-align="right" placeholder="请输入" />
			</div>

			<div>
				<van-field label="缺陷描述" input-align="right">
					<template #input>
						<van-radio-group v-model="objectionableContent" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div v-if="objectionableContent=='NG'">
				<van-field v-model="txtReason" label="缺陷名称" input-align="right" @keyup.enter.native="onEnter(4)"
					ref="filed4" placeholder="请输入或选择" clearable>
					<van-button slot="button" size="small" type="info" @click.stop="showreasonspopup">选择
					</van-button>
				</van-field>
			</div>
			<div class="confirm_dellist">
				<div class="list_has_del" v-for="(item,index) in reasons">
					<span>{{index+1}}、缺陷名称：{{item}}</span>
					<div class="list_has_del_r">
						<span class="del_btn" @click="onDelete(4,index)">删除</span>
					</div>

				</div>
			</div>
			<div>
				<van-field label="每模每条自检" input-align="right">
					<template #input>
						<van-radio-group v-model="selfTest" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>

			<div class='no'>
				<van-field v-model="moldingScen" label="黑胶扫描" :label-width="100" input-align="right" placeholder="请输入"
					@keyup.enter.native="onEnter(5)" />
			</div>
			<div class='no'>
				<van-field v-model="molding" disabled label="黑胶型号/规格" input-align="right" placeholder="请输入"
					:label-width="120" ref="filed1" :error-message="errorMsg1" error-message-align="right" />
			</div>
			<div class='no'>
				<van-field disabled v-model="vinylFormat" label="黑胶批次/箱号" :label-width="120" input-align="right"
					placeholder="请输入" autofocus ref="filed1" :error-message="errorMsg1" error-message-align="right" />
			</div>

			<div class='no'>
				<van-field disabled v-model="rewarmingCompletionTime" label="回温完成时间" :label-width="100"
					input-align="right" placeholder="请输入" autofocus ref="filed1" :error-message="errorMsg1"
					error-message-align="right" />
			</div>
			<div class='no'>
				<van-field disabled v-model="useDeadline" label="有效使用截止时间" :label-width="120" input-align="right"
					placeholder="请输入" autofocus ref="filed1" :error-message="errorMsg1" error-message-align="right" />
			</div>
			<div>
				<van-field label="4H自检" input-align="right">
					<template #input>
						<van-radio-group v-model="selfTest4H" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div class='no'>
				<van-field v-model="containerNumber" label="容器编号" input-align="right" placeholder="请输入" autofocus
					ref="filed1" :error-message="errorMsg1" error-message-align="right" />
			</div>
			<div>
				<van-field label="首批抽一模全检" input-align="right">
					<template #input>
						<van-radio-group v-model="allTest" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div class='no'>
				<van-field v-model="remark" label="备注" input-align="right" placeholder="请输入" autofocus ref="filed1"
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<van-tag type="success" size="large">{{tag}}</van-tag>

			<div class="btm_btn">
				<van-row>
					<van-col span="10">
						<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" block square @click="save">{{btnName}}</van-button>
					</van-col>
				</van-row>
			</div>
			<van-popup v-model="showPicker" position="bottom">
				<van-picker show-toolbar :columns="columns" @cancel="showPicker = false" @confirm="onConfirmPopup"
					value-key="storeName" />
			</van-popup>
			<van-popup v-model="showPicker1" position="bottom">
				<van-datetime-picker type="datetime" @confirm="onConfirm" v-model="currentDate"
					@cancel="showPicker1 = false" :columns-order="['month', 'day', 'year', 'hour', 'minute']"
					:formatter="formatter" :min-date="minDate" :max-date="maxDate" />
			</van-popup>
			<!--缺陷选择相关弹层-->
			<van-popup v-model="reasonspopup" position="right" :style="{ width: '80%',height:'100%' }">
				<div class="popup_list">
					<div class="popub_title">缺陷列表</div>
					<div class="pop_list">
						<van-checkbox-group v-model="selectedreasonsCode">
							<van-checkbox v-for="(item,index) in popupreasonsList" :name="item">
								<div class="row_line">{{item}}</div>
							</van-checkbox>
						</van-checkbox-group>
					</div>
				</div>
				<van-row class="popup_fixed_btn">
					<van-col span="10">
						<van-button color="#ccc" square block @click="reasonspopup=false">取消</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" square block @click="confirmPopupreasons">确认选择</van-button>
					</van-col>
				</van-row>
			</van-popup>
		</div>
		<script>
			new Vue({
				el: '#app',
				data: {
					type: '', //物料类型
					btnName: '确认',
					showPicker: false,
					columns: [],
					qc: '',
					qcCode: '',

					locationCode: '', //货架
					materialContent: '', //条码内容
					errorMsg1: "",
					errorMsg2: "",
					pModel: "",
					time: "",
					package: "",
					remark: '',
					shebeikouya: [],
					wuliaokouya: [],
					judgment: '',
					objectionableContent: "OK",

					numberOfSample: 0,
					outNumberOfSample: 0,
					txtReason: "",
					reasons: [],
					reasonspopup: false,
					popupreasonsList: [
						"混料",
						"本体错位",
						"裂纹",
						"缺角",
						"塌丝",
						"冲丝",
						"注不足",
						"引脚溢胶",
						"气孔/针孔",
						"脚压伤",
						"本体划伤",
						"散热片溢胶",
						"底材外露",
						"焊线外露",
						"本体麻面",
						"本体脏污"
					],
					selectedreasonsCode: "",

					tag: "No:JDW-WI-0-E005-01(d)",

					containerNumber: '',
					molding: '',
					selfTest: '',
					intime: '',
					outtime: '',
					vinylFormat: '',
					vinylTime: '',
					selfTest4H: '',
					allTest: '',
					value: '',
					showPicker1: false,
					minDate: new Date(2024, 0, 1),
					maxDate: new Date(),
					currentDate: '',
					moldingScen: '',
					useDeadline: '',
					rewarmingCompletionTime: '',


				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.qcCode = localStorage.userCode;
					this.qc = localStorage.userName;

				},
				created() {

					var type = getQueryVariable('type'); //线边仓库类型或仓库类型	
					var materialContent = getQueryVariable('CardID') || ""; //线边仓库类型或仓库类型
					var locationCode = getQueryVariable('EquipmentCode') || ""; //线边仓库类型或仓库类型


					this.title = 'IC注塑站生产记录'

					if (locationCode != null) {
						this.materialContent = materialContent
						this.locationCode = locationCode
					}

				},
				methods: {
					formatter(type, val) {
						if (type === 'year') {
							return val + '-';
						}
						if (type === 'month') {
							return val + '-';
						}
						if (type === 'day') {
							return val + '  ';
						}
						if (type === 'hour') {
							return val + ':';
						}
						return val;
					},
					onConfirm(time) {
						// 格式化日期

						const year = time.getFullYear();
						const month = String(time.getMonth() + 1).padStart(2, '0'); // 补零
						const day = String(time.getDate()).padStart(2, '0'); // 补零
						const hours = String(time.getHours()).padStart(2, '0'); // 补零
						const minutes = String(time.getMinutes()).padStart(2, '0'); // 补零


						// 格式化为 "2025-04-15 08:32"
						const formattedTime = `${year}-${month}-${day} ${hours}:${minutes}:00`;

						this.outtime = formattedTime;
						this.showPicker1 = false;
					},
					//确认选择缺陷
					confirmPopupreasons: function() {
						var self = this;
						if (this.selectedreasonsCode.length == 0) {
							self.$toast('请先选择缺陷！');
							return
						}
						var hasRepeat = false
						for (var index = 0; index < self.selectedreasonsCode.length; index++) {
							var element = self.selectedreasonsCode[index];
							var bf1 = false;
							for (var k = 0; k < self.reasons.length; k++) {
								var item = self.reasons[k];
								if (item == element) {
									bf1 = true;
									break;
								}
							}
							if (bf1 == false) {
								for (var j = 0; j < self.popupreasonsList.length; j++) {
									var model1 = self.popupreasonsList[j];
									if (model1 == element) {
										self.reasons.push(model1);
									}
								}
							} else {
								hasRepeat = true;
							}
						}
						if (hasRepeat) {
							self.$toast('已为您筛选掉重复的缺陷！');
						}
						this.activeNames = ['4']
						this.reasonspopup = false;
					},
					//显示缺陷选择弹窗
					showreasonspopup: function() {
						this.reasonspopup = true;
						this.selectedreasonsCode = [];
					},


					getNowTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.outtime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					showPopup() {
						this.showPicker = true;
					},


					backLast: function() {
						window.location.href = "javascript:history.go(-1)";
					},

					//出入库提交
					save: function() {
						var self = this;
						var param = {
							qc: localStorage.userName,
							qcCode: localStorage.userCode,
							cardID: self.materialContent,
							pModel: self.pModel,
							package: self.package,
							intime: self.intime,
							outtime: self.outtime,

							numberOfSamples: self.numberOfSample,
							outNumberOfSample: self.outNumberOfSample,

							selfTest: self.selfTest,
							molding: self.molding,
							vinylFormat: self.vinylFormat,
							selfTest4H: self.selfTest4H,
							vinylTime: self.useDeadline,
							containerNumber: self.containerNumber,
							allTest: self.allTest,
							remark: self.remark,

							objectionableContent: self.objectionableContent,
							reasons: self.reasons,
							Tag: self.tag,
							tpye: "3",
							rewarmingCompletionTime: self.rewarmingCompletionTime,
							equipmentCode: self.locationCode,
						}
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认提交?',
						}).then(function() {
							$.ajax({
								url: serviceUrl + '/api/pda/hung11',
								type: 'POST',
								data: param,
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage
										.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.$dialog.alert({
											title: '提示',
											message: '操作成功!'
										}).then(function() {

											self.reset()
										})
									} else {
										self.$toast(res.msg);

									}
								},
								error: function() {
									self.$toast('网络异常');
								}
							})
						}).catch(function() {
							// on cancel
						});
					},

					//删除
					onDelete: function(type, index) {
						var self = this;

						self.reasons.splice(index, 1)




					},
					//重置
					reset: function() {
						var self = this;
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认重置?',
						}).then(function() {

							// 方法1: 直接刷新页面
							window.location.reload();


						}).catch(function() {
							// on cancel
						});
					},

					//是否触发回车	
					onEnter: function(type) {
						var self = this;
						switch (type) {
							case 0:
								self.onFocus(type);
								break;
							case 1: //工卡			
								self.onFocus(type);
								break;
							case 2:
								this.getCardInfo();
								break;
							case 4: //缺陷


								var isExist = false;
								for (var index = 0; index < self.reasons.length; index++) {
									var element = self.reasons[index];
									if (self.txtReason == element) {
										isExist = true;
										break;
									}
								}
								if (!isExist) {
									self.reasons.push(self.txtReason)
								} else {
									self.$toast('已扫描过相同缺陷');
								}
								self.txtReason = ''

								break;
							case 5:
								this.getPartInfo();
						}
					},

					//获取卡号信息
					getCardInfo() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getCardContent',
							type: 'GET',
							data: {
								cardID: self.materialContent,
								equipmentCode: self.locationCode,
								type: 23,
								kind: 1
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg1 = ''
									self.$refs.filed2.focus();
									self.numberOfSample = res.data.cardInfo.LastStepQuantity;
									self.outNumberOfSample = res.data.cardInfo.CurrentQuantity;
									self.package = res.data.cardInfo.PackageName;
									self.pModel = res.data.cardInfo.PModel;
									self.materialContent = res.data.cardInfo.CardID;
									self.locationCode = res.data.cardInfo.EquipmentCode;
									self.intime = res.data.cardInfo.GenerationTime
									self.outtime=res.data.operationRecords1[0].OperationTime
									self.CurrentQuantity
									console.log(self.numberOfSample);
								} else {
									self.$toast(res.msg);

									self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},
					//获取材料信息
					getPartInfo() {
						console.log(this.moldingScen);
						const inputValue = this.moldingScen.trim();
						if (!inputValue) return;
						var moldinge = null
						var moldingeBatch = null
						const parts = inputValue.split('*');

						if (parts.length === 4) {
							moldinge = parts[1];
							moldingeBatch = parts[2];

							var self = this;
							$.ajax({
								url: serviceUrl + '/api/pda/getPartContent',
								type: 'GET',
								data: {
									molding: moldinge,
									moldingeBatch: moldingeBatch,

								},
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										console.log(res.data);
										self.molding = res.data.partnumber.PModel
										self.vinylFormat = moldingeBatch
										self.rewarmingCompletionTime = res.data.eMcReceivingRecord.EndTime
										self.useDeadline = res.data.eMcReceivingRecord.ValidUntilTime

									} else {
										self.$toast(res.msg);

										self.$refs.filed2.focus();
									}
								},
								error: function() {
									self.$toast('网络异常');
									self.materialContent = '';
									self.$refs.filed2.focus();
								}
							})

							this.moldingScen = ''; // 清空输入框
						} else {
							this.$toast.fail('扫描格式不正确，请重新扫描！');
							this.moldinge = '';
							this.moldingeBatch = '';
						}

					},
					//自动触发焦点聚焦
					onFocus: function(type) {
						var self = this;
						if (type == 0) {
							self.$refs.filed1.focus();
						} else if (type == 1) {
							self.$refs.filed2.focus();
						} else if (type == 2) {
							// self.$refs.filed1.focus();
						}
					},
					onConfirmPopup(value) {


						this.showPicker = false;
					},

				}
			})
			Vue.config.devtools = true; //允许进行调试
		</script>
		<style>
			.row {
				display: flex;
				align-items: center;
				margin-bottom: 10px;
			}

			.field-label {
				margin-right: 10px;
				margin-right: 16px;
				font-size: 14px;
				color: #323233da;
				line-height: 32px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.flex-container {
				display: flex;
				align-items: center;
			}

			.flex-label-col {
				display: flex;
