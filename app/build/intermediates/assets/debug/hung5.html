					<van-row>

					<van-row>

			<div class='no'>
				<van-field v-model="qc" label="品质人员" input-align="right" placeholder="请输入"
					@keyup.enter.native="onEnter(1)" autofocus ref="filed1" required :error-message="errorMsg1"
					error-message-align="right" />
			</div>
			<div class='no custom-van-field'>
				<span class="field-label">综合判定：</span>
				<van-radio-group v-model="judgment" direction="horizontal">
					<van-radio name="OK">OK</van-radio>
					<van-radio name="NG">NG</van-radio>
				</van-radio-group>
			</div>
			<div class='no custom-van-field'>
				<span class="field-label">物料扣押：</span>
				<van-checkbox-group v-model="wuliaokouya" direction="horizontal" :disabled="judgment !== 'NG'">
					<van-checkbox name="NG">NG</van-checkbox>
				</van-checkbox-group>
			</div>
			<div class='no custom-van-field'>
				<span class="field-label">设备扣押：</span>
				<van-checkbox-group v-model="shebeikouya" direction="horizontal" :disabled="judgment !== 'NG'">
					<van-checkbox name="NG">NG</van-checkbox>
				</van-checkbox-group>
			</div>
			<div class='no'>
				<van-field v-model="remark" label="备注" input-align="right" placeholder="请输入"
					@keyup.enter.native="onEnter(1)" autofocus ref="filed1" required :error-message="errorMsg1"
					error-message-align="right" />
			</div>
			<van-tag type="success" size="large">{{tag}}</van-tag>
			<div class="btm_btn">
				<van-row>
					<van-col span="10">
						<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" block square @click="save">{{btnName}}</van-button>
					</van-col>
				</van-row>
			</div>
			<van-popup v-model="showPicker" position="bottom">
				<van-picker show-toolbar :columns="columns" @cancel="showPicker = false" @confirm="onConfirmPopup"
					value-key="storeName" />
			</van-popup>

		<script>
			new Vue({
				el: '#app',
				data: {
					type: '', //物料类型
					btnName: '确认',
					showPicker: false,
					columns: [],
					errorMsg1: "",
					errorMsg2: "",

					qc: '',
					qcCode: '',
					locationCode: '', //货架
					materialContent: '', //条码内容
					pModel: "",
					time: "",
					clearanceConfirmation: "",
					engraving: '',
					coil: '',
					tape: '',
					coverTape: '',
					testParameter: '',
					fontSettings: '',
					package: '',
					lali: '',
					waiguan: '',
					lidBrushed: '',
					OpenRottenBiased: '',
					ProductReverse: '',
					vacancy: '',
					Flipping: '',
					PoorLettering: '',
					BadPins: '',
					BrokenCasing: '',
					physicalCharacterModeling: '',
					specialRequirementsCustomers: '',
					remark: '',
					shebeikouya: [],
					wuliaokouya: [],
					judgment: '',
					kind: 1,
					inspectionOptions: [{
							text: '首件',
							value: 1,
						},
						{
							text: '巡检',
							value: 2,
						}
					],
					markContent: '',
					tag: "No:JDW-WI-Q-Q011-03(c)",
					ps:''
				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.qcCode = localStorage.userCode;
					this.qc = localStorage.userName;

				},
				created() {

					var type = getQueryVariable('type'); //线边仓库类型或仓库类型	
					var materialContent = getQueryVariable('CardID') || ""; //线边仓库类型或仓库类型
					var locationCode = getQueryVariable('EquipmentCode') || ""; //线边仓库类型或仓库类型

					this.type = type ? type : '5';
					if (this.type == 5) {

						this.title = 'IC测试站品质首件确认表'
					}
					if (locationCode != null) {
						this.materialContent = materialContent
						this.locationCode = locationCode
					}

				},
				methods: {
					onConfirmInspectionType(value) {
						this.inspectionType = value;
					},
					onCancelInspectionType() {
						this.inspectionType = '';
					},
					getNowTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.time = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					showPopup() {
						this.showPicker = true;
					},


					backLast: function() {
						window.location.href = "javascript:history.go(-1)";
					},

					//出入库提交
					save: function() {
						var self = this;
						var param = {
							kind: self.kind,
							cardID: self.materialContent,
							pModel: self.pModel,
							locationCode: self.locationCode,
							time: self.time,
							clearanceConfirmation: self.clearanceConfirmation,
							engraving: self.engraving,
							coil: self.coil,
							tape: self.tape,
							coverTape: self.coverTape,
							testParameter: self.testParameter,
							fontSettings: self.fontSettings,
							package: self.package,
							waiguan: self.waiguan,
							lali: self.lali,
							lidBrushed: self.lidBrushed,
							openRottenBiased: self.OpenRottenBiased,
							productReverse: self.ProductReverse,
							vacancy: self.vacancy,
							flipping: self.Flipping,
							poorLettering: self.PoorLettering,
							badPins: self.BadPins,
							brokenCasing: self.BrokenCasing,
							specialRequirementsCustomers: self.specialRequirementsCustomers,
							physicalCharacterModeling: self.physicalCharacterModeling,
							qc: localStorage.userName,
							qcCode: localStorage.userCode,
							remark: self.remark,
							wuliaokouya: this.wuliaokouya.includes("NG") ? "NG" : "",
							shebeikouya: this.shebeikouya.includes("NG") ? "NG" : "",
							markContent: self.markContent,
							judgment:self.judgment
						}
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认提交?',
						}).then(function() {
							$.ajax({
								url: serviceUrl + '/api/pda/postHung5',
								type: 'POST',
								data: param,
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage
										.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.$dialog.alert({
											title: '提示',
											message: '操作成功!'
										}).then(function() {


										})
									} else {
										self.$toast(res.msg);

									}
								},
								error: function() {
									self.$toast('网络异常');
								}
							})
						}).catch(function() {
							// on cancel
						});
					},

					//重置
					reset: function() {
						var self = this;
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认重置?',
						}).then(function() {

							// 重置所有属性
							self.locationCode = '';
							self.materialContent = '';
							self.errorMsg1 = '';
							self.errorMsg2 = '';
							self.pModel = '';
							self.getNowTime();
							self.clearanceConfirmation = '';
							self.engraving = '';
							self.coil = '';
							self.tape = '';
							self.coverTape = '';
							self.testParameter = '';
							self.fontSettings = '';
							self.package = '';
							self.lali = '';
							self.waiguan = '';
							self.lidBrushed = '';
							self.OpenRottenBiased = '';
							self.ProductReverse = '';
							self.vacancy = '';
							self.Flipping = '';
							self.PoorLettering = '';
							self.BadPins = '';
							self.BrokenCasing = '';
							self.physicalCharacterModeling = '';
							self.specialRequirementsCustomers = '';
							self.remark = '';
							self.shebeikouya = [];
							self.wuliaokouya = [];
							self.judgment = '';


						}).catch(function() {
							// on cancel
						});
					},

					//是否触发回车	
					onEnter: function(type) {
						var self = this;
						switch (type) {
							case 0: {
								self.onFocus(type);
							}
							case 1: //工卡			
								self.onFocus(type);
								break;
							case 2:
								this.getCardInfo();
								break;
						}
					},

					//获取卡号信息
					getCardInfo() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getCardContent',
							type: 'GET',
							data: {
								kind: self.kind,
								cardID: self.materialContent,
								type: this.type,
								equipmentCode: self.locationCode
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg1 = ''
									self.$refs.filed2.focus();
									self.locationCode = res.data.EquipmentCode;
									self.pModel = res.data.PModel;
									self.materialContent = res.data.CardID;
									self.markContent = res.data.MarkContent;
									self.testParameter = res.data.TestParameter;
								} else {
									self.$toast(res.msg);

									self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},

					//自动触发焦点聚焦
					onFocus: function(type) {
						var self = this;
						if (type == 0) {
							self.$refs.filed1.focus();
						} else if (type == 1) {
							self.$refs.filed2.focus();
						} else if (type == 2) {
							// self.$refs.filed1.focus();
						}
					},
					onConfirmPopup(value) {


						this.showPicker = false;
					},

				}
			})
			Vue.config.devtools = true; //允许进行调试
		</script>
		<style>

			.flex-field-col {
				display: flex;

			.custom-van-field {
				background-color: rgb(255, 255, 255);

			}
