<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="black" name="apple-mobile-web-app-status-bar-style">
		<meta content="telephone=no" name="format-detection">
		<title>IC首检</title>
		<!-- 引入 Vue 和 Vant 的 JS 文件 -->
		<script src="js/jquery.min.js"></script>
		<script src="js/vue.min.js"></script>
		<script src="js/vant.min.js"></script>
		<script src="js/common.js"></script>
		<link rel="stylesheet" href="styles/style.css" />
		<!-- 引入样式文件 -->
		<link rel="stylesheet" href="styles/vant.css" />
	</head>

	<body>
		<div id="app">
			<div>
				<van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
			</div>
			<!-- <div>
				<van-cell value="1.检查频率：首检，1次/机台/班，设备维修/调整参数，外观不良每次10条；" />
			</div> -->

			<div>
				<van-field v-model="time" label="日期时间" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<div>
				<van-field readonly clickable name="picker" input-align="right" :value="value" label="改机部门"
					placeholder="点击选择部门" @click="showPicker = true" />
			</div>
			<div id='no' v-if="value=='1生产部门'">
				<van-field v-model="Remould_Type" label="项目编码" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					required @keyup.enter.native="onEnter(1)" />
			</div>
			<div id='no' v-if="value=='2设备部门'">
				<van-field label="改机状态" input-align="right">
					<template #input>
						<van-radio-group v-model="isRemould" direction="horizontal">
							<van-radio name="开始改机">开始改机</van-radio>
							<van-radio name="完成改机">完成改机</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div id='no'>
				<van-field v-model="locationCode" label="机台编号" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					required :error-message="errorMsg1" error-message-align="right" @keyup.enter.native="onEnter(1)" />
			</div>

			<div v-if="value=='1生产部门'&&(Remould_Type=='A01'||Remould_Type=='B01')">
				<div id='no'>
					<van-field v-model="beforeCardID" label="改机前卡号" input-align="right" placeholder="请输入或扫描工卡"
						ref="filed0" :error-message="errorMsg2" error-message-align="right"
						@keyup.enter.native="onEnter(2)" />
				</div>
				<div class='no'>
					<van-field disabled v-model="beforePackage" :label-width="260" label="改机前产品封装" input-align="right"
						placeholder="请输入" />
				</div>
				<div class='no'>
					<van-field disabled v-model="befotePModel" :label-width="260" label="改机前产品类型" input-align="right"
						placeholder="请输入" />
				</div>

				<div class='no'>
					<van-field disabled v-model="beforeBondVersion" :label-width="260" label="改机前封装版本"
						input-align="right" placeholder="请输入" />
				</div>
				<div id='no'>
					<van-field v-model="afterCardID" label="改机后卡号" input-align="right" placeholder="请输入或扫描工卡"
						ref="filed0" :error-message="errorMsg2" error-message-align="right"
						@keyup.enter.native="onEnter(3)" />
				</div>
				<div class='no'>
					<van-field disabled v-model="afterPackage" :label-width="260" label="改机后产品封装" input-align="right"
						placeholder="请输入" />
				</div>
				<div class='no'>
					<van-field disabled v-model="afterPModel" :label-width="260" label="改机后产品类型" input-align="right"
						placeholder="请输入" />
				</div>

				<div class='no'>
					<van-field v-model="afterBondVersion" disabled :label-width="260" label="改机后封装版本"
						input-align="right" placeholder="请输入" />
				</div>
			</div>




			<van-cell-group title="检验项目">
				<div class="confirm_dellist">
					<div class="list_has_del" v-for="(item,index) in Projects">
						<div v-if="item.Project_Type=='textbox'">
							<span>{{index+1}}、项目名称：{{item.Project}}</span>
							<div v-if="item.MinLine!=null">
								<van-field required v-model="item.Result" label="结果" input-align="right" type="number"
									placeholder="请输入" @blur="validateInput($event,item)" />
							</div>
							<div v-else>
								<van-field required v-model="item.Result" label="结果" input-align="right"
									placeholder="请输入" />
							</div>
						</div>
						<div v-else>
							<span>{{index+1}}、项目名称：{{item.Project}}</span>
							<van-field required label="结果" input-align="right">
								<template #input>
									<van-radio-group v-model="item.Result" direction="horizontal">
										<van-radio name="OK">OK</van-radio>
										<van-radio name="NG">NG</van-radio>

									</van-radio-group>
								</template>
							</van-field>
						</div>
					</div>
				</div>
			</van-cell-group>



			<div class='no'>
				<van-field v-model="qc" label="作业员" input-align="right" placeholder="请输入" :error-message="errorMsg1"
					error-message-align="right" />
			</div>
			<div class='no'>
				<van-field v-model="remark" label="备注" input-align="right" placeholder="请输入" />
			</div>
			<van-tag type="success" size="large">{{tag}}</van-tag>


			<div class="btm_btn">
				<van-popup v-model="showPicker" position="bottom">
					<van-picker show-toolbar :columns="columns" @confirm="onConfirm" @cancel="showPicker = false" />
				</van-popup>

				<van-row>
					<van-col span="10">
						<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" block square @click="save">{{btnName}}</van-button>
					</van-col>
				</van-row>


			</div>


		</div>
		<script>
			new Vue({
				el: '#app',
				data: {
					type: '', //物料类型
					btnName: '确认',
					showPicker: false,
					columns: [],
					qc: '',
					qcCode: '',

					locationCode: '', //货架
					materialContent: '', //条码内容
					errorMsg1: "",
					errorMsg2: "",
					pModel: "",
					time: "",

					remark: '',
					tag: '',
					conveyorSpeed: '',
					value: '1生产部门',
					columns: ['1生产部门', '2设备部门', '3生产部门', '4品质部门'],
					showPicker: false,
					// Projects: [],//保养项目列表
					Projects: [], //保养项目列表
					Remould_Type: '',
					step: '',
					isRemould: "",
					afterCardID: '',
					beforeCardID: '',
					beforeBondVersion: '',
					beforePackage: '',
					befotePModel: '',
					afterBondVersion: '',
					afterPModel: '',
					afterPackage: '',


				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.qcCode = localStorage.userCode;
					this.qc = localStorage.userName;

				},
				created() {

					// 封装原生获取URL参数的方法，内部解码
					const getUrlParam = (name) => {
						const reg = new RegExp(`(^|&)${name}=([^&]*)(&|$)`);
						const r = window.location.search.substr(1).match(reg);
						return r ? decodeURIComponent(r[2]) : '';
					};

					// 获取并解码后的参数
					const type = getUrlParam('type');
					const equipmentCode = getUrlParam('equipmentCode');
					// var equipmentCode = getQueryVariable('equipmentCode') || ""; //线边仓库类型或仓库类型
					// var type = getQueryVariable('type') || "";

					this.title = 'IC改机'

					if (equipmentCode != '') {
						this.value = '2设备部门'
						this.isRemould = type == '开始改机' ? '完成改机' : '开始改机'
						this.locationCode = equipmentCode
						if (this.isRemould == '完成改机')
							this.getDeviceRemould();
					}

				},
				methods: {
					//是否触发回车
					getDeviceRemould: function() {
						var self = this;
						if (this.value && this.isRemould != "开始改机") {
							self.Projects = []
							$.ajax({
								url: serviceUrl + '/api/pda/getDeviceRemould',
								type: 'GET',
								data: {
									Device_No: self.locationCode,
									deptCode: self.value,
									Remould_Type: self.Remould_Type
								},
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.errorMsg1 = ''
										if (res.data) {
											console.log(res);
											self.Device_Code = res.data.Device_Code;
											self.TaskCode = res.data.TaskCode;
											self.ModifyUser = localStorage.userCode;
											self.ModifyUserName = localStorage.userName;

											var list = res.data.Projects;
											self.step = list[0].Sequence_No
											for (var i = 0; i < list.length; i++) {
												const Project = list[i];
												self.Projects.push(Project)
											}
										}
										self.$toast('设备校验成功');
										// self.onFocus(1);
									} else {
										self.errorMsg1 = '找不到对应的项目代码'
										self.$toast(res.msg);
									}
								},
								error: function() {
									self.errorMsg1 = '找不到对应的项目代码'
									self.$toast('找不到对应的项目代码');
								}
							})
						}
					},

					onConfirm(value) {
						this.value = value;
						this.showPicker = false;
					},


					onConfirmInspectionType(value) {
						this.inspectionType = value;
					},
					onCancelInspectionType() {
						this.inspectionType = '';
					},
					getNowTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.time = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					showPopup() {
						this.showPicker = true;
					},


					backLast: function() {
						window.location.href = "javascript:history.go(-1)";
					},

					//出入库提交
					save: function() {
						var self = this;
						console.log(self.Projects);
						var param = {
							Device_No: self.locationCode,
							User_Code: localStorage.userCode,
							Production_User: localStorage.userCode,
							DeptCode: self.value,
							Equ_Device_Remould_Project_List: self.Projects,
							Remould_Type: self.Remould_Type,
							isRemould: self.isRemould,
							afterCardID: self.afterCardID,
							beforeCardID: self.beforeCardID,
							beforeBondVersion: self.beforeBondVersion,
							beforePackage: self.beforePackage,
							befotePModel: self.befotePModel,
							afterBondVersion: self.afterBondVersion,
							afterPModel: self.afterPModel,
							afterPackage: self.afterPackage,

						}
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认提交?',
						}).then(function() {
							$.ajax({
								url: serviceUrl + '/api/pda/saveDeviceRemould',
								type: 'POST',
								data: param,
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage
										.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.$dialog.alert({
											title: '提示',
											message: '操作成功!'
										}).then(function() {

											self.reset()
										})
									} else {
										self.$toast(res.msg);

									}
								},
								error: function() {
									self.$toast('网络异常');
								}
							})
						}).catch(function() {
							// on cancel
						});
					},

					//重置
					reset: function() {
						var self = this;
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认重置?',
						}).then(function() {

							// 示例：如果需要重新获取初始数据
							window.location.reload();


						}).catch(function() {
							// on cancel
						});
					},

					//是否触发回车	
					onEnter: function(type) {
						var self = this;
						switch (type) {
							case 0: {
								self.onFocus(type);
							}
							case 1: //工卡			

								self.getDeviceRemould();
								// self.onFocus(type);
								break;
							case 2:
								self.getBeforeCardInfo();
								break;
							case 3:
								self.getAfterCardInfo();
								break;

						}
					},

					//获取卡号信息
					getBeforeCardInfo() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getcardbasicinfo',
							type: 'GET',
							data: {

								cardID: self.beforeCardID,


							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg2 = ''
									// self.$refs.filed2.focus();
									// self.locationCode = res.data.EquipmentCode;
									self.befotePModel = res.data.partName;
									self.beforePackage = res.data.packageName;
									self.beforeBondVersion = res.data.plan_Workorder
										.CurPlan_workorderEngineering.BondVersion;



								} else {
									self.$toast(res.msg);

									// self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},

					//获取卡号信息
					getAfterCardInfo() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getcardbasicinfo',
							type: 'GET',
							data: {

								cardID: self.afterCardID,


							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg2 = ''
									// self.$refs.filed2.focus();
									// self.locationCode = res.data.EquipmentCode;
									self.afterPModel = res.data.partName;
									self.afterPackage = res.data.packageName;
									self.afterBondVersion = res.data.plan_Workorder
										.CurPlan_workorderEngineering.BondVersion;



								} else {
									self.$toast(res.msg);

									// self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},

					//自动触发焦点聚焦
					onFocus: function(type) {
						var self = this;
						if (type == 0) {
							self.$refs.filed1.focus();
						} else if (type == 1) {
							self.$refs.filed2.focus();
						} else if (type == 2) {
							// self.$refs.filed1.focus();
						}
					},
					onConfirmPopup(value) {
						this.showPicker = false;
					},
					//删除
					onDelete: function(type, index) {
						var self = this;
						self.reasons.splice(index, 1)
					},

				}
			})
			Vue.config.devtools = true; //允许进行调试
		</script>
		<style>
			.row {
				display: flex;
				align-items: center;
				margin-bottom: 10px;
			}

			.field-label {
				margin-right: 10px;
				margin-right: 16px;
				font-size: 14px;
				color: #323233da;
				line-height: 32px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.flex-container {
				display: flex;
				align-items: center;
			}

			.flex-label-col {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100px;
				/* 根据需要调整高度 */
			}

			.flex-field-col {
				display: flex;
				flex-direction: column;
				justify-content: space-around;
			}

			.custom-van-field {
				background-color: rgb(255, 255, 255);
				/* padding: 10px; */
				display: inline-flex;
				justify-content: space-between;
				width: 100%;
			}
		</style>
	</body>
</html>
