<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="black" name="apple-mobile-web-app-status-bar-style">
		<meta content="telephone=no" name="format-detection">
		<title>IC首检</title>
		<!-- 引入 Vue 和 Vant 的 JS 文件 -->
		<script src="js/jquery.min.js"></script>
		<script src="js/vue.min.js"></script>
		<script src="js/vant.min.js"></script>
		<script src="js/common.js"></script>
		<!-- 引入样式文件 -->
		<link rel="stylesheet" href="styles/vant.css" />
		<link rel="stylesheet" href="styles/style.css" />
	</head>

	<body>
		<div id="app">
			<div>
				<van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
			</div>
			<div>
				<van-cell value="频率：每批" />
			</div>

			<div>

				<van-field v-model="intime" label="开始时间" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<div>
				<van-field input-align="right" readonly clickable name="datetimePicker" :value="outtime" label="结束时间"
					placeholder="点击选择时间" @click="showPicker1 = true" />
			</div>

			<div>

				<van-field label="班别" input-align="right">
					<template #input>
						<van-radio-group v-model="clazz" direction="horizontal">
							<van-radio name="A">A</van-radio>
							<van-radio name="B">B</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div class='no'>
				<van-field v-model="qc" label="记录人员" input-align="right" placeholder="请输入" ref="filed1"
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<div>
				<van-field v-model="materialContent" label="工卡号" input-align="right" placeholder="请输入或扫描工卡号"
					@keyup.enter.native="onEnter(2)" ref="filed2" required autofocus />
			</div>
			<div id='no'>
				<van-field v-model="locationCode" label="机台号" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					@keyup.enter.native="onEnter(1)" />
			</div>
			<div>

				<van-field v-model="dieTpye" label="芯片型号" input-align="right" placeholder="请选择芯片型号">
					<template #input>
						<van-dropdown-menu>
							<van-dropdown-item v-model="dieTpye" :options="options" @change="onSelect" />
						</van-dropdown-menu>
					</template>
				</van-field>
			</div>

			<div>
				<van-field disabled v-model="package" label="封装类型" input-align="right" placeholder="请输入" />
			</div>

			<div>
				<van-field disabled v-model="pModel" label="产品型号" input-align="right" placeholder="请输入" />
			</div>

			<div>
				<van-field v-model="sModel" label="银胶型号" input-align="right" placeholder="请输入" />
			</div>
			<div>
				<van-field v-model="documentaryNumber" label="记录片号" input-align="right" placeholder="请输入" />
			</div>
			<div>
				<!-- <van-field v-model="sModel" label="吸嘴/点胶头清理4H/次" input-align="right" placeholder="请输入" /> -->
				<van-field label="吸嘴/点胶头清理4H/次" input-align="right">
					<template #input>
						<van-radio-group v-model="h4" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div class='no'>


				<van-field label="外观检查" input-align="right">
					<template #input>
						<van-radio-group v-model="visualInspection" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
				<span style="color:#999; font-size:12px; margin-left:8px;">
					（3H、开班）
				</span>
			</div>
			<div>
				<van-row id="size" class="flex-container">
					<van-col span="4"
						style="display: flex; justify-content: center; align-items: center; writing-mode: vertical-rl; text-orientation: upright;">
						料盒号码
					</van-col>
					<van-col span="19" class="flex-field-col">
						<van-row>
							<van-field v-model="leftnumber" label="左工作台" input-align="right" placeholder="输入..." />
						</van-row>
						<van-row>
							<van-field v-model="rightnumber" input-align="right" label="右工作台" placeholder="输入..." />
						</van-row>


					</van-col>
				</van-row>
			</div>
			<!-- 			<div>
				<van-field v-model="numberOfSample" label="投入/K" input-align="right" placeholder="请输入" />
			</div> -->
			<div>
				<van-field v-model="outNumberOfSample" label="产出/K" input-align="right" placeholder="请输入" />
			</div>


			<div class='no'>
				<van-field v-model="outNumber" label="产出条数" input-align="right" placeholder="请输入" autofocus ref="filed1"
					:error-message="errorMsg1" error-message-align="right" />
			</div>

			<div class='no'>
				<van-field v-model="remark" label="备注" input-align="right" placeholder="请输入" autofocus ref="filed1"
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<van-tag type="success" size="large">{{tag}}</van-tag>

			<div class="btm_btn">
				<van-row>
					<van-col span="10">
						<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" block square @click="save">{{btnName}}</van-button>
					</van-col>
				</van-row>
			</div>
			<van-popup v-model="showPicker" position="bottom">
				<van-picker show-toolbar :columns="columns" @cancel="showPicker = false" @confirm="onConfirmPopup"
					value-key="storeName" />
			</van-popup>
			<van-popup v-model="showPicker1" position="bottom">
				<van-datetime-picker type="datetime" @confirm="onConfirm" v-model="currentDate"
					@cancel="showPicker1 = false" :columns-order="['month', 'day', 'year', 'hour', 'minute']"
					:formatter="formatter" :min-date="minDate" :max-date="maxDate" />
			</van-popup>

		</div>
		<script>
			new Vue({
				el: '#app',
				data: {
					type: '', //物料类型
					btnName: '确认',
					showPicker: false,
					columns: [],
					qc: '',
					qcCode: '',

					locationCode: '', //货架
					materialContent: '', //条码内容
					errorMsg1: "",
					errorMsg2: "",
					pModel: "",
					time: "",
					package: "",
					remark: '',
					shebeikouya: [],
					wuliaokouya: [],
					judgment: '',
					objectionableContent: "OK",
					intime: '',

					outtime: '',

					numberOfSample: 0,
					outNumberOfSample: 0,
					txtReason: "",
					reasons: [],
					reasonspopup: false,
					popupreasonsList: [
						"胶体开裂",
						"混料",
						"组件外露",
						"本体缺角",
						"注塑来料不良",
						"引脚溢胶",
						"焊线外露",
						"弯脚反向",
						"引脚变形",
						"设备卡料",
					],
					selectedreasonsCode: "",
					tag: "No:JDW-WI-0-E011-02(c)",
					NumberDefects: '',
					NumberSamples: '',
					containerNumber: '',
					molding: '',
					showPicker1: false,
					minDate: new Date(2024, 0, 1),
					maxDate: new Date(),
					currentDate: new Date(),
					clazz: '',
					sModel: '',
					rightnumber: '',
					leftnumber: '',
					outNumber: '',
					visualInspection: '',
					h4: '',
					documentaryNumber: '',
					dieTpye: '',
					options: [{
							text: '型号1',
							value: 'model1',
							pinNumber: 1
						},
						{
							text: '型号2',
							value: 'model2',
							pinNumber: 1
						}
					],
					selectedDieModel: '',
					step: ''

				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.qcCode = localStorage.userCode;
					this.qc = localStorage.userName;

				},
				created() {

					var type = getQueryVariable('type'); //线边仓库类型或仓库类型	
					var materialContent = getQueryVariable('CardID') || ""; //线边仓库类型或仓库类型
					var locationCode = getQueryVariable('EquipmentCode') || ""; //线边仓库类型或仓库类型


					this.title = 'DB生产记录'

					if (locationCode != null) {
						this.materialContent = materialContent
						this.locationCode = locationCode
					}

				},
				methods: {
					onSelect(value) {

						this.getCapillarySpecifications();
						
						this.getNowOutTime()
					},
					getCapillarySpecifications() {
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getdbProductionRecord',
							type: 'GET',
							data: {
								card: self.materialContent,
								equipmentCode: self.locationCode,
								dieTpye: self.dieTpye,
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log("data", res.data);

									self.errorMsg1 = '';
									if (res.data && res.data.length > 0) {
										const firstData = res.data[0];
										self.intime = firstData && firstData.Intime !== undefined ? firstData
											.Intime : undefined;
										self.clazz = firstData && firstData.Clazz !== undefined ? firstData
											.Clazz : undefined;
										self.sModel = firstData && firstData.SModel !== undefined ? firstData
											.SModel : undefined;
										self.documentaryNumber = firstData && firstData.DocumentaryNumber !==
											undefined ? firstData.DocumentaryNumber : undefined;
										self.h4 = firstData && firstData.H4 !== undefined ? firstData.H4 :
											undefined;
										self.visualInspection = firstData && firstData.VisualInspection !==
											undefined ? firstData.VisualInspection : undefined;
										self.leftnumber = firstData && firstData.Leftnumber !== undefined ?
											firstData.Leftnumber : undefined;
										self.rightnumber = firstData && firstData.rightnumber !== undefined ?
											firstData.rightnumber : undefined;
										self.outNumberOfSample = firstData && firstData.OutNumberOfSample !==
											undefined ? firstData.OutNumberOfSample : undefined;
										self.outNumber = firstData && firstData.OutNumber !== undefined ?
											firstData.OutNumber : undefined;
										self.remark = firstData && firstData.Remark !== undefined ? firstData
											.Remark : undefined;
									}
								} else {
									self.$toast(res.msg);
									// self.pinNumber = '';/
									// self.$refs.filed3.focus();
								}
							},
							error: function() {
								self.$toast('请求错误');
								self.$refs.filed2.focus();
							}
						})
					},
					formatter(type, val) {
						if (type === 'year') {
							return val + '-';
						}
						if (type === 'month') {
							return val + '-';
						}
						if (type === 'day') {
							return val + '  ';
						}
						if (type === 'hour') {
							return val + ':';
						}
						return val;
					},
					onConfirm(time) {
						// 格式化日期

						const year = time.getFullYear();
						const month = String(time.getMonth() + 1).padStart(2, '0'); // 补零
						const day = String(time.getDate()).padStart(2, '0'); // 补零
						const hours = String(time.getHours()).padStart(2, '0'); // 补零
						const minutes = String(time.getMinutes()).padStart(2, '0'); // 补零


						// 格式化为 "2025-04-15 08:32"
						const formattedTime = `${year}-${month}-${day} ${hours}:${minutes}:00`;

						this.outtime = formattedTime;
						this.showPicker1 = false;
					},
					//确认选择缺陷
					confirmPopupreasons: function() {
						var self = this;
						if (this.selectedreasonsCode.length == 0) {
							self.$toast('请先选择缺陷！');
							return
						}
						var hasRepeat = false
						for (var index = 0; index < self.selectedreasonsCode.length; index++) {
							var element = self.selectedreasonsCode[index];
							var bf1 = false;
							for (var k = 0; k < self.reasons.length; k++) {
								var item = self.reasons[k];
								if (item == element) {
									bf1 = true;
									break;
								}
							}
							if (bf1 == false) {
								for (var j = 0; j < self.popupreasonsList.length; j++) {
									var model1 = self.popupreasonsList[j];
									if (model1 == element) {
										self.reasons.push(model1);
									}
								}
							} else {
								hasRepeat = true;
							}
						}
						if (hasRepeat) {
							self.$toast('已为您筛选掉重复的缺陷！');
						}
						this.activeNames = ['4']
						this.reasonspopup = false;
					},
					//显示缺陷选择弹窗
					showreasonspopup: function() {
						this.reasonspopup = true;
						this.selectedreasonsCode = [];
					},


					onConfirmInspectionType(value) {
						this.inspectionType = value;
					},
					onCancelInspectionType() {
						this.inspectionType = '';
					},
					getNowTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.intime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					getNowOutTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.outtime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					showPopup() {
						this.showPicker = true;
					},


					backLast: function() {
						window.location.href = "javascript:history.go(-1)";
					},

					//出入库提交
					save: function() {
						var self = this;
						var param = {
							Intime: self.intime,
							Outtime: self.outtime,
							EquipmentCode: self.locationCode,
							Clazz: self.clazz,
							Qc: localStorage.userName,
							QcCode: localStorage.userCode,
							CardID: self.materialContent,
							Package: self.package,
							PModel: self.pModel,
							SModel: self.sModel,
							DocumentaryNumber: self.documentaryNumber,
							H4: self.h4,
							VisualInspection: self.visualInspection,
							Leftnumber: self.leftnumber,
							Rightnumber: self.rightnumber,
							OutNumberOfSample: self.outNumberOfSample,
							OutNumber: self.outNumber,
							Remark: self.remark,
							DieType: self.dieTpye
						}
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认提交?',
						}).then(function() {
							$.ajax({
								url: serviceUrl + '/api/pda/hung13',
								type: 'POST',
								data: param,
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage
										.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.$dialog.alert({
											title: '提示',
											message: '操作成功!'
										}).then(function() {

											self.reset()
										})
									} else {
										self.$toast(res.msg);

									}
								},
								error: function() {
									self.$toast('网络异常');
								}
							})
						}).catch(function() {
							// on cancel
						});
					},

					//删除
					onDelete: function(type, index) {
						var self = this;

						self.reasons.splice(index, 1)




					},
					//重置
					reset: function() {
						var self = this;
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认重置?',
						}).then(function() {

							// 示例：如果需要重新获取初始数据
							window.location.reload();

						}).catch(function() {
							// on cancel
						});
					},

					//是否触发回车	
					onEnter: function(type) {
						var self = this;
						switch (type) {
							case 0:
								self.onFocus(type);
								break;
							case 1: //工卡			
								self.onFocus(type);
								this.getsilverColloidReceivingRecord();
								break;
							case 2:
								this.getCardInfo();
								break;
							case 4: //缺陷

								var isExist = false;
								for (var index = 0; index < self.reasons.length; index++) {
									var element = self.reasons[index];
									if (self.txtReason == element) {
										isExist = true;
										break;
									}
								}
								if (!isExist) {
									self.reasons.push(self.txtReason)
								} else {
									self.$toast('已扫描过相同缺陷');
								}
								self.txtReason = ''

								break;
						}
					},

					//获取卡号信息
					getCardInfo() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getCardContent',
							type: 'GET',
							data: {
								cardID: self.materialContent,
								equipmentCode: self.locationCode,
								type: 233,
								kind: 4
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg1 = ''
									self.$refs.filed2.focus();
									self.step = res.data.cardInfo.CurrentStepCode;
									self.numberOfSample = res.data.cardInfo.LastStepQuantity;
									self.outNumberOfSample = res.data.cardInfo.CurrentQuantity;
									self.package = res.data.cardInfo.PackageName;
									self.pModel = res.data.cardInfo.PModel;
									self.materialContent = res.data.cardInfo.CardID;
									// if (res.data.cardInfo.CurrentStepCode == "104010") {
									// 	// self.locationCode = res.data.cardInfo.EquipmentCode;
									// 	self.intime = res.data.cardInfo.GenerationTime
									// 	if (res.data.operationRecords1.length > 0)
									// 		self.outtime = res.data.operationRecords1[0].OperationTime

									// }

									self.options = res.data.options
									console.log(res.data.options);
								} else {
									self.$toast(res.msg);

									self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},

					

					//获取银胶信息
					getsilverColloidReceivingRecord() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getsilverColloidReceivingRecord',
							type: 'GET',
							data: {
								equipmentCode: self.locationCode,
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg1 = ''
									self.sModel = res.data.OutSilverColloidModel;

								} else {
									self.$toast(res.msg);

									self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},

					//自动触发焦点聚焦
					onFocus: function(type) {
						var self = this;
						if (type == 0) {
							self.$refs.filed1.focus();
						} else if (type == 1) {
							self.$refs.filed2.focus();
						} else if (type == 2) {
							// self.$refs.filed1.focus();
						}
					},
					onConfirmPopup(value) {


						this.showPicker = false;
					},

				}
			})
			Vue.config.devtools = true; //允许进行调试
		</script>
		<style>
			.row {
				display: flex;
				align-items: center;
				margin-bottom: 10px;
			}

			.field-label {
				margin-right: 10px;
				margin-right: 16px;
				font-size: 14px;
				color: #323233da;
				line-height: 32px;
