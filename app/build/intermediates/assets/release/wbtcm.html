<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="black" name="apple-mobile-web-app-status-bar-style">
		<meta content="telephone=no" name="format-detection">
		<title>IC首检</title>
		<!-- 引入 Vue 和 Vant 的 JS 文件 -->
		<script src="js/jquery.min.js"></script>
		<script src="js/vue.min.js"></script>
		<script src="js/vant.min.js"></script>
		<script src="js/common.js"></script>
		<link rel="stylesheet" href="styles/style.css" />
		<!-- 引入样式文件 -->
		<link rel="stylesheet" href="styles/vant.css" />
	</head>

	<body>
		<div id="app">
			<div>
				<van-nav-bar :title="title" left-arrow left-text="返回" @click-left="backLast" />
			</div>
			<div>
				<!-- <van-cell value="频率：每批" /> -->
			</div>
			<div>

				<van-field v-model="time" label="日期时间" input-align="right" placeholder="请输入" ref="filed1" required
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<div>

				<van-field label="班别" input-align="right">
					<template #input>
						<van-radio-group v-model="clazz" direction="horizontal">
							<van-radio name="A">A</van-radio>
							<van-radio name="B">B</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>
			<div class='no'>
				<van-field v-model="qc" label="操机人员" input-align="right" placeholder="请输入" autofocus ref="filed1"
					required :error-message="errorMsg1" error-message-align="right" />
			</div>

			<div id='no'>
				<van-field v-model="locationCode" label="机台号" input-align="right" placeholder="请输入或扫描设备" ref="filed0"
					required :error-message="errorMsg1" error-message-align="right" autofocus
					@keyup.enter.native="onEnter(1)" />
			</div>

			<div class='no'>

				<van-field label="1.清洁散线" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode1" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>

			<div class='no'>
				<van-field input-align="right">
					<template #label>
						2.线材使用寿命
					</template>
					<template #input>
						<van-radio-group v-model="freeCode2" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>

				</van-field>
				<span style="color:#999; font-size:12px; margin-left:8px;">
					（铜线≤72H，银合金线使用寿命≤168H）
				</span>
			</div>

			<div class='no'>
				<van-field input-align="right">
					<template #label>
						3.线材有效期
					</template>
					<template #input>
						<van-radio-group v-model="freeCode3" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>

				</van-field>
				<span style="color:#999; font-size:12px; margin-left:8px;">
					（≤6个月）
				</span>
			</div>

			<div class='no'>
				<van-field label="4.线径清洁" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode4" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>

			<div class='no'>

				<van-field label="5.检查设备状态及标识牌一致" :label-width="180" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode5" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>

			</div>
			<!-- 	<div>
				<van-row id="size" class="flex-container">
					<van-col span="4"
						style="display: flex; justify-content: center; align-items: center; writing-mode: vertical-rl; text-orientation: upright;">
						检查保护气体流量
					</van-col>
					<van-col span="19" class="flex-field-col">
						<van-row>
							<van-field v-model="freeCode6" label="数值1" input-align="right" placeholder="请输入"
								error-message-align="right" type='number' />
			
						</van-row>
						<van-row>
							<van-field v-model="freeCode7" label="数值2" input-align="right" placeholder="请输入"
								error-message-align="right" type='number' />
						</van-row>
						<van-row>
							<van-field v-model="freeCode8" label="数值3" input-align="right" placeholder="请输入"
								error-message-align="right" type='number' />
						</van-row>
			
					</van-col>
				</van-row>
			</div> -->


			<div class='no'>

				<van-field label="9.加热块是否脏污" :label-width="180" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode9" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>
			</div>

			<div class='no'>

				<van-field label="10.压板有无压牢" :label-width="180" input-align="right">
					<template #input>
						<van-radio-group v-model="freeCode10" direction="horizontal">
							<van-radio name="OK">OK</van-radio>
							<van-radio name="NG">NG</van-radio>
						</van-radio-group>
					</template>
				</van-field>

			</div>

			<div class='no'>
				<van-field v-model="freeCode11" label="11.劈刀当前使用寿命" :label-width="180" input-align="right"
					placeholder="请输入" ref="filed5" required error-message-align="right" />

			</div>
			<div class='no'>
				<van-field v-model="freeCode12" label="12.预温区温度" :label-width="180" input-align="right"
					placeholder="请输入" ref="filed5" error-message-align="right" />

			</div>

			<div class='no'>
				<van-field v-model="freeCode13" label="13.主温区温度" :label-width="180" input-align="right"
					placeholder="请输入" ref="filed5" required error-message-align="right" />

			</div>

			<div class='no'>
				<van-field v-model="freeCode14" label="14.后温区温度" :label-width="180" input-align="right"
					placeholder="请输入" ref="filed5" required error-message-align="right" />

			</div>




			<div class='no'>
				<van-field v-model="remark" label="备注" input-align="right" placeholder="请输入" autofocus ref="filed1"
					:error-message="errorMsg1" error-message-align="right" />
			</div>
			<van-tag type="success" size="large">{{tag}}</van-tag>

			<div class="btm_btn">
				<van-row>
					<van-col span="10">
						<van-button type="info" color="#ccc" block square @click="reset">重置</van-button>
					</van-col>
					<van-col span="14">
						<van-button type="info" block square @click="save">{{btnName}}</van-button>
					</van-col>
				</van-row>
			</div>
			<van-popup v-model="showPicker" position="bottom">
				<van-picker show-toolbar :columns="columns" @cancel="showPicker = false" @confirm="onConfirmPopup"
					value-key="storeName" />
			</van-popup>

		</div>
		<script>
			new Vue({
				el: '#app',
				data: {
					type: '', //物料类型
					btnName: '确认',
					showPicker: false,
					columns: [],
					qc: '',
					qcCode: '',

					locationCode: '', //货架
					materialContent: '', //条码内容
					errorMsg1: "",
					errorMsg2: "",
					pModel: "",
					time: "",
					package: "",
					remark: '',
					shebeikouya: [],
					wuliaokouya: [],

					tag: "",

					clazz: '',
					freeCode1: '',
					freeCode2: '',
					freeCode3: '',
					freeCode4: '',
					freeCode5: '',
					freeCode6: '',
					freeCode7: '',
					freeCode8: '',
					freeCode9: '',
					freeCode10: '',
					freeCode11: '',
					freeCode12: '',
					freeCode13: '',
					freeCode14: '',


				},
				//封装好的方法挂载到mounted里面
				mounted: function(data) {
					this.getNowTime();
					this.qcCode = localStorage.userCode;
					this.qc = localStorage.userName;

				},
				created() {

					var type = getQueryVariable('type'); //线边仓库类型或仓库类型	
					var materialContent = getQueryVariable('CardID') || ""; //线边仓库类型或仓库类型
					var locationCode = getQueryVariable('EquipmentCode') || ""; //线边仓库类型或仓库类型


					this.title = '焊线点检记录本'

					if (locationCode != null) {
						this.materialContent = materialContent
						this.locationCode = locationCode
					}

				},
				methods: {

					getNowTime() {
						let now = new Date();
						let year = now.getFullYear();
						let month = (now.getMonth() + 1).toString().padStart(2, '0');
						let day = now.getDate().toString().padStart(2, '0');
						let hours = now.getHours().toString().padStart(2, '0');
						let minutes = now.getMinutes().toString().padStart(2, '0');
						let seconds = now.getSeconds().toString().padStart(2, '0');
						this.time = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
					},
					showPopup() {
						this.showPicker = true;
					},


					backLast: function() {
						window.location.href = "javascript:history.go(-1)";
					},

					//出入库提交
					save: function() {
						var self = this;
						var param = {
							locationCode: self.locationCode,
							checktime: self.time,
							userName: localStorage.userName,
							userCode: localStorage.userCode,
							remark: self.remark,
							clazz: self.clazz,
							freeCode1: self.freeCode1,
							freeCode2: self.freeCode2,
							freeCode3: self.freeCode3,
							freeCode4: self.freeCode4,
							freeCode5: self.freeCode5,
							freeCode6: self.freeCode6,
							freeCode7: self.freeCode7,
							freeCode8: self.freeCode8,
							freeCode9: self.freeCode9,
							freeCode10: self.freeCode10,
							freeCode11: self.freeCode11,
							freeCode12: self.freeCode12,
							freeCode13: self.freeCode13,
							freeCode14: self.freeCode14,

						}
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认提交?',
						}).then(function() {
							$.ajax({
								url: serviceUrl + '/api/pda/Postwbtcm',
								type: 'POST',
								data: param,
								contentType: "application/x-www-form-urlencoded",
								dataType: 'json',
								beforeSend: function(XMLHttpRequest) {
									XMLHttpRequest.setRequestHeader("token", localStorage.token);
									XMLHttpRequest.setRequestHeader("secret", localStorage
										.secret);
								},
								success: function(res) {
									if (res.code == 200) {
										self.$dialog.alert({
											title: '提示',
											message: '操作成功!'
										}).then(function() {

											// self.reset()
										})
									} else {
										self.$toast(res.msg);

									}
								},
								error: function() {
									self.$toast('网络异常');
								}
							})
						}).catch(function() {
							// on cancel
						});
					},

					//删除
					onDelete: function(type, index) {
						var self = this;

						self.reasons.splice(index, 1)




					},
					//重置
					reset: function() {
						var self = this;
						self.$dialog.confirm({
							title: '提示',
							message: '是否确认重置?',
						}).then(function() {

							// 示例：如果需要重新获取初始数据
							window.location.reload();
						}).catch(function() {
							// on cancel
						});
					},

					//是否触发回车	
					onEnter: function(type) {
						var self = this;
						switch (type) {
							case 0:
								self.onFocus(type);
								break;
							case 1: //工卡			
								self.onFocus(type);
								break;
							case 2:
								this.getCardInfo();
								break;
							case 4: //缺陷

								var isExist = false;
								for (var index = 0; index < self.reasons.length; index++) {
									var element = self.reasons[index];
									if (self.txtReason == element) {
										isExist = true;
										break;
									}
								}
								if (!isExist) {
									self.reasons.push(self.txtReason)
								} else {
									self.$toast('已扫描过相同缺陷');
								}
								self.txtReason = ''

								break;
						}
					},

					//获取卡号信息
					getCardInfo() {
						console.log(this.materialContent);
						var self = this;
						$.ajax({
							url: serviceUrl + '/api/pda/getCardContent',
							type: 'GET',
							data: {
								cardID: self.materialContent,
								equipmentCode: self.locationCode,
								type: 22,
								kind: 1
							},
							contentType: "application/x-www-form-urlencoded",
							dataType: 'json',
							beforeSend: function(XMLHttpRequest) {
								XMLHttpRequest.setRequestHeader("token", localStorage.token);
								XMLHttpRequest.setRequestHeader("secret", localStorage.secret);
							},
							success: function(res) {
								if (res.code == 200) {
									console.log(res.data);
									self.errorMsg1 = ''
									self.$refs.filed2.focus();
									self.numberOfSample = res.data.CurrentQuantity;
									self.package = res.data.PackageName;
									self.pModel = res.data.PModel;
									self.materialContent = res.data.CardID;
									self.locationCode = res.data.EquipmentCode;
									self.actualLettering = res.data.CustomerCode;
									console.log(self.numberOfSample);
								} else {
									self.$toast(res.msg);

									self.$refs.filed2.focus();
								}
							},
							error: function() {
								self.$toast('网络异常');
								self.materialContent = '';
								self.$refs.filed2.focus();
							}
						})
					},

					//自动触发焦点聚焦
					onFocus: function(type) {
						var self = this;
						if (type == 0) {
							self.$refs.filed1.focus();
						} else if (type == 1) {
							self.$refs.filed2.focus();
						} else if (type == 2) {
							// self.$refs.filed1.focus();
						}
					},
					onConfirmPopup(value) {


						this.showPicker = false;
					},

				}
			})
			Vue.config.devtools = true; //允许进行调试
		</script>
		<style>
			.row {
				display: flex;
				align-items: center;
				margin-bottom: 10px;
			}

			.field-label {
				margin-right: 10px;
				margin-right: 16px;

				color: #323233da;
				line-height: 32px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.flex-container {
				display: flex;
				align-items: center;
			}

			.flex-label-col {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100px;
				/* 根据需要调整高度 */
			}

			.flex-field-col {
				display: flex;
				flex-direction: column;
				justify-content: space-around;
			}

			.custom-van-field {
				background-color: rgb(255, 255, 255);
				/* padding: 10px; */
				display: inline-flex;
				justify-content: space-between;
				width: 100%;
			}
		</style>
	</body>
